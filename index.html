        const callGemini = async (promptText) => {
            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],

            };
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (error) {
                    if (i === delays.length) throw error;

        // ==========================================

            qrCodeUrl: 'https://img2.pic.in.th/pic/099400240646898.png', marqueeText: 'ขอเชิญร่วมทำบุญตามกำลังศรัทธา... สะสมบุญ นำสุขมาให้', requireSlip: true,
            about: { title: "ประวัติและข้อมูล", heading: "ความร่มเย็นแห่งล้านนา", highlightWord: "ล้านนา", content: "วัดไชยามาตย์ ตั้งอยู่ที่ตำบลเวียงทอง อำเภอสูงเม่น จังหวัดแพร่...", imageUrl: "https://images.unsplash.com/photo-1579548231964-b0a701fccf23?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            receipt: { taxId: "0 9940 02406 46 8", abbotName: "พระครูวิจารณ์ธรรมาภิวัฒน์", address: "104 ต.เวียงทอง อ.สูงเม่น จ.แพร่", defaultPurpose: "เงินบริจาคเพื่อบำรุงวัด", signatureUrl: "https://img5.pic.in.th/file/secure-sv1/-2023-11-16-05_18_24.jpg", stampUrl: "https://img2.pic.in.th/pic/f92fb4547a09098985b9076b5c1c6a4b.png" },
            emailNotify: { enabled: true, serviceId: 'service_ep43sf5', templateId: 'template_aw5olcc', publicKey: '', adminEmail: 'nawaratk65@gmail.com' },
            lineNotify: { enabled: false, webhookUrl: '', targetIds: '', messageTemplate: '🔔 แจ้งยอดรับบริจาค 🔔\n{{temple_name}}\n-------------------------\n👤 ผู้บริจาค: {{name}}\n📝 รายการ: {{purpose}}\n💰 จำนวนเงิน: {{amount}} บาท\n💳 ช่องทาง: {{method}}\n📌 หมายเหตุ: {{note}}' },
            users: [ { id: 'u1', username: 'admin', password: 'admin104', role: 'admin', name: 'ผู้ดูแลระบบสูงสุด', permissions: ['all'] }, { id: 'u2', username: 'staff', password: '104', role: 'staff', name: 'เจ้าหน้าที่รับบริจาค', permissions: ['donate', 'dashboard'] } ],
            passwords: { editPin: '104' }, bankInfo: { bankName: 'ธ.กรุงไทย', accountName: 'วัดไชยามาตย์', accountNumber: 'xxx-x-xxxxx-x' },
            contact: { phone: '082-2801992', address: 'หมู่ที่ 1 ตำบลเวียงทอง อำเภอสูงเม่น จังหวัดแพร่ 54130', facebook: '', line: '' }, messages: { thankYou: 'ขออนุโมทนาบุญ...' },

        };

        const FONT_OPTIONS = [ { id: 'Sarabun', name: 'Sarabun (ทางการ)' }, { id: 'Prompt', name: 'Prompt (ทันสมัย)' }, { id: 'Kanit', name: 'Kanit (ยอดนิยม)' }, { id: 'Mitr', name: 'Mitr (เป็นมิตร)' }, { id: 'Mali', name: 'Mali (ลายมือ)' } ];
        const E_TAX_URL = "https://chaiyamartta.github.io/E-Tax-Donation/";

        // ==========================================
        // 3. UTILITIES
        // ==========================================
        const convertToThaiBahtText = (amount) => {
            if (amount === 0 || isNaN(amount)) return "ศูนย์บาทถ้วน";
            const numberString = Math.floor(amount).toString();
            const numbers = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
            const positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
            let text = ''; let length = numberString.length;
            for (let i = 0; i < length; i++) {
                const num = parseInt(numberString.charAt(i)); const pos = length - i - 1;
                if (num !== 0) {
                    if (pos === 1 && num === 1) text += 'สิบ';
                    else if (pos === 1 && num === 2) text += 'ยี่สิบ';
                    else if (pos === 0 && num === 1 && length > 1 && parseInt(numberString.charAt(i-1)) !== 0) text += 'เอ็ด';
                    else text += numbers[num] + positions[pos];
                } else if (pos === 6) text += positions[pos];
            }
            return text + "บาทถ้วน";
        };

        const resizeImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
                        let targetWidth = img.width; let targetHeight = img.height;
                        if (targetWidth > MAX_WIDTH) { targetHeight = targetHeight * (MAX_WIDTH / targetWidth); targetWidth = MAX_WIDTH; }
                        canvas.width = targetWidth; canvas.height = targetHeight;
                        const ctx = canvas.getContext('2d');
                        if (file.type === 'image/png') { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); resolve(canvas.toDataURL('image/png')); } 
                        else { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); resolve(canvas.toDataURL('image/jpeg', 0.7)); }
                    }; img.onerror = reject;
                }; reader.onerror = reject;
            });
        };

        const NotificationToast = ({ msg, onClose, type = 'success' }) => {
            if (!msg) return null;
            const bgColor = type === 'success' ? 'bg-green-100 border-green-500 text-green-800' : 'bg-red-100 border-red-500 text-red-800';
            return (
                <div className={`fixed top-4 right-4 z-[500] flex items-center p-4 mb-4 rounded-lg border-l-4 shadow-lg animate-bounce-in ${bgColor}`}>
                    <div className="text-sm font-medium">{msg}</div>
                    <button onClick={onClose} className="ml-4 hover:opacity-70"><X className="w-4 h-4" /></button>
                </div>
            );
        };

        // ==========================================
        // 4. SUB-COMPONENTS
        // ==========================================
        
        // Component: สแกนอัปโหลดสลิปจากมือถือ
        function RemoteSlipUploader({ sessionId, db, themeColor }) {
            const [isUploading, setIsUploading] = useState(false);
            const [uploadSuccess, setUploadSuccess] = useState(false);
            const [error, setError] = useState(null);
            
            const handleFileChange = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsUploading(true); setError(null);
                try {
                    const resizedBase64 = await resizeImage(file);
                    await updateDoc(doc(db, 'temp_slips', sessionId), {
                        status: 'uploaded', image: resizedBase64, updatedAt: new Date().toISOString()
                    });
                    setUploadSuccess(true);
                } catch (err) { setError("เกิดข้อผิดพลาดในการอัปโหลด กรุณาลองใหม่"); } 
                finally { setIsUploading(false); }
            };

            const theme = themeColor || 'orange';

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white max-w-sm w-full p-8 rounded-3xl shadow-xl text-center">
                        <div className={`w-20 h-20 bg-${theme}-100 text-${theme}-600 rounded-full flex items-center justify-center mx-auto mb-6`}>
                            <Smartphone className="w-10 h-10" />
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">อัปโหลดสลิปการโอนเงิน</h2>
                        <p className="text-gray-500 mb-8 text-sm">ข้อมูลจะถูกส่งไปยังหน้าจอเจ้าหน้าที่โดยอัตโนมัติ</p>

                        {uploadSuccess ? (
                            <div className="animate-scale-up space-y-4">
                                <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <CheckCircle className="w-10 h-10" />
                                </div>
                                <h3 className="text-xl font-bold text-green-600">อัปโหลดสำเร็จ!</h3>
                                <p className="text-gray-600 text-sm">รูปสลิปถูกส่งไปที่หน้าจอเจ้าหน้าที่แล้ว<br/>ท่านสามารถปิดหน้าจอนี้ได้เลย</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <label className={`cursor-pointer block border-2 border-dashed border-${theme}-300 rounded-2xl p-8 hover:bg-${theme}-50 transition-colors bg-white`}>
                                    <div className="flex flex-col items-center justify-center">
                                        {isUploading ? (
                                            <><Loader className={`w-12 h-12 animate-spin text-${theme}-500 mb-4`} /><span className={`text-${theme}-600 font-bold`}>กำลังส่งรูปสลิป...</span></>
                                        ) : (
                                            <><UploadCloud className={`w-12 h-12 text-${theme}-400 mb-4`} /><span className="text-lg font-bold text-gray-700">แตะเพื่อเลือกรูปสลิป</span><span className="text-sm text-gray-400 mt-2">จากอัลบั้มในมือถือของคุณ</span></>
                                        )}
                                    </div>
                                    <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} disabled={isUploading} />
                                </label>
                                {error && <div className="text-red-500 text-sm bg-red-50 p-3 rounded-lg">{error}</div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Component: ฟอร์มรับบริจาค (70/30 Split สำหรับเจ้าหน้าที่, Textarea สำหรับชื่อ)
        function DonationForm({ loggedInUser, userRole, onSave, showNotification, settings }) {
            const [name, setName] = useState('');
            const [method, setMethod] = useState((userRole === 'staff' || userRole === 'admin') ? 'เงินสด' : 'เงินโอน');
            const [generalNote, setGeneralNote] = useState('');
            const [slipImage, setSlipImage] = useState(null); 
            const [isUploading, setIsUploading] = useState(false);
            const [isGeneratingBlessing, setIsGeneratingBlessing] = useState(false);
            const [showThankYou, setShowThankYou] = useState(false);
            const [selectedItems, setSelectedItems] = useState({});
            
            const theme = settings.themeColor || 'orange';
            const donationTypes = settings.donationTypes || [];

            const [showSlipQr, setShowSlipQr] = useState(false);
            const [currentUploadSession, setCurrentUploadSession] = useState(null);

            useEffect(() => {
                const initial = {};
                donationTypes.forEach(type => { if (type.active) initial[type.id] = { checked: false, quantity: 1, amount: type.price || '' }; });
                const roongTaan = donationTypes.find(t => t.id === 'roong_taan');
                if (roongTaan && roongTaan.active) initial['roong_taan'] = { checked: false, date: '', note: '' };
                setSelectedItems(prev => ({...initial, ...prev}));
            }, [donationTypes]);

            useEffect(() => {
                if (userRole === 'staff' || userRole === 'admin') setMethod('เงินสด'); else setMethod('เงินโอน');
            }, [userRole]);

            // ติดตามการส่งรูปจากมือถือ
            useEffect(() => {
                if (!currentUploadSession) return;
                const unsub = onSnapshot(doc(db, 'temp_slips', currentUploadSession), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.status === 'uploaded' && data.image) {
                            setSlipImage(data.image); setShowSlipQr(false); setCurrentUploadSession(null); showNotification("ได้รับรูปสลิปจากมือถือแล้ว!", "success");
                            deleteDoc(doc(db, 'temp_slips', currentUploadSession)).catch(console.error);
                        }
                    }
                });
                return () => unsub();
            }, [currentUploadSession, db, showNotification]);

            const totalAmount = useMemo(() => {
                let sum = 0;
                donationTypes.forEach(type => {
                    if (selectedItems[type.id]?.checked && !type.isSpecial) {
                        if (type.hasQuantity) sum += (selectedItems[type.id].quantity || 1) * type.price;
                        else sum += Number(selectedItems[type.id].amount || 0);
                    }
                });
                return sum;
            }, [selectedItems, donationTypes]);

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploading(true);
                    try { const resized = await resizeImage(file); setSlipImage(resized); } 
                    catch (err) { showNotification("ไม่สามารถอ่านไฟล์ได้", 'error'); } 
                    finally { setIsUploading(false); }
                }
            };
            
            const handleGenerateBlessing = async () => {
                if (!name) return showNotification("กรุณาระบุชื่อผู้บริจาคก่อน", "error");
                setIsGeneratingBlessing(true);
                try {
                    const prompt = `เขียนคำอวยพรสั้นๆ 1-2 ประโยค สำหรับผู้ที่มาทำบุญที่วัด ชื่อผู้บริจาค: ${name} ขอภาษาไทยไพเราะ เป็นสิริมงคล`;
                    const result = await callGemini(prompt);
                    setGeneralNote(result.trim().replace(/^["']|["']$/g, ''));
                } catch(e) { showNotification("สร้างคำอวยพรไม่สำเร็จ", "error"); } 
                finally { setIsGeneratingBlessing(false); }
            };

            const generateSlipQr = async () => {
                const sessionId = `slip_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                try {
                    await setDoc(doc(db, 'temp_slips', sessionId), { status: 'waiting', image: null, createdAt: new Date().toISOString() });
                    setCurrentUploadSession(sessionId); setShowSlipQr(true);
                } catch (error) { showNotification("สร้าง QR Code ไม่สำเร็จ", "error"); }
            };

            const cancelSlipQr = () => {
                if (currentUploadSession) deleteDoc(doc(db, 'temp_slips', currentUploadSession)).catch(console.error);
                setShowSlipQr(false); setCurrentUploadSession(null);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (settings.systemStatus === 'closed') return showNotification('ขณะนี้ปิดรับบริจาคชั่วคราว', 'error');
                if (!name) return showNotification('กรุณาระบุชื่อ-สกุล', 'error');
                
                const isRoongTaanChecked = selectedItems['roong_taan']?.checked;
                if (totalAmount <= 0 && !isRoongTaanChecked) return showNotification('กรุณาระบุยอดเงินบริจาค', 'error');
                if (isRoongTaanChecked && (!selectedItems['roong_taan'].date || !selectedItems['roong_taan'].note)) return showNotification('ระบุวันที่และสิ่งของสำหรับโรงทาน', 'error');
                if (settings.requireSlip !== false && method === 'เงินโอน' && !slipImage && userRole === 'donor') return showNotification('กรุณาแนบสลิปการโอนเงิน', 'error');

                let purposeParts = [];
                donationTypes.forEach(type => {
                    const item = selectedItems[type.id];
                    if (item?.checked) {
                        if (type.isSpecial && type.id === 'roong_taan') purposeParts.push(`จองโรงทาน`);
                        else if (type.hasQuantity) purposeParts.push(`${type.name} ${item.quantity} ${type.unit} (${(item.quantity * type.price).toLocaleString()} บาท)`);
                        else purposeParts.push(`${type.name} ${Number(item.amount).toLocaleString()} บาท`);
                    }
                });

                const newDonation = { 
                    dateTime: new Date().toISOString(), name, purpose: purposeParts.join(', '), amount: totalAmount, method, generalNote, 
                    status: userRole === 'donor' ? 'pending' : 'approved', source: userRole === 'donor' ? 'self' : 'staff', 
                    recordedBy: loggedInUser ? loggedInUser.name : 'ผู้บริจาค (ออนไลน์)', announced: false, 
                    roongTaanDate: isRoongTaanChecked ? selectedItems['roong_taan'].date : null, roongTaanNote: isRoongTaanChecked ? selectedItems['roong_taan'].note : null, slipImage: slipImage 
                };
                onSave(newDonation);
                if (userRole === 'donor') setShowThankYou(true); else resetForm();
            };

            const resetForm = () => {
                setName(''); setMethod((userRole === 'staff' || userRole === 'admin') ? 'เงินสด' : 'เงินโอน'); setGeneralNote(''); setSlipImage(null);
                const resetItems = {}; Object.keys(selectedItems).forEach(key => { resetItems[key] = { ...selectedItems[key], checked: false, amount: '', quantity: 1, date: '', note: '' }; });
                setSelectedItems(resetItems); setShowThankYou(false);
            }

            if (showThankYou) {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8 text-center animate-scale-up">
                        <div className={`w-20 h-20 bg-${theme}-100 rounded-full flex items-center justify-center mx-auto mb-6`}><HeartHandshake className={`w-10 h-10 text-${theme}-600`} /></div>
                        <h2 className={`text-2xl font-bold text-${theme}-700 mb-4`}>อนุโมทนาบุญ</h2>
                        <p className="text-gray-600 text-lg leading-relaxed mb-8">{settings.messages?.thankYou || 'ขอขอบคุณที่ร่วมทำบุญ'}</p>
                        <button onClick={resetForm} className={`bg-${theme}-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-${theme}-700 transition`}>กลับสู่หน้าหลัก</button>
                    </div>
                );
            }

            const renderDonationItems = () => (
                donationTypes.filter(t => t.active).map(type => {
                    const itemState = selectedItems[type.id] || { checked: false, quantity: 1, amount: '' }; const isChecked = itemState.checked;
                    return (
                        <div key={type.id} className={`p-4 rounded-xl border transition-all duration-200 cursor-pointer ${isChecked ? `bg-${theme}-50 border-${theme}-300 shadow-sm ring-1 ring-${theme}-200` : 'border-gray-200 hover:bg-gray-50'}`} onClick={() => setSelectedItems({...selectedItems, [type.id]: {...itemState, checked: !isChecked}})}>
                            <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center">
                                    <input type="checkbox" className={`w-5 h-5 text-${theme}-600 rounded border-gray-300 pointer-events-none`} checked={isChecked} readOnly />
                                    <span className={`ml-3 text-base ${isChecked ? 'font-bold text-gray-900' : 'font-medium text-gray-700'}`}>{type.name} {type.hasQuantity && <span className="text-xs text-gray-500 font-normal ml-1">({type.price}.-)</span>}</span>
                                </div>
                                {isChecked && type.hasQuantity && <span className={`text-${theme}-600 font-bold text-lg`}>{(itemState.quantity * type.price).toLocaleString()} <span className="text-xs">บ.</span></span>}
                            </div>
                            {isChecked && (
                                <div className="ml-8 flex items-center gap-2 animate-fade-in mt-3" onClick={e => e.stopPropagation()}>
                                    {type.isSpecial && type.id === 'roong_taan' ? (
                                        <div className="space-y-3 w-full">
                                            <input type="date" className="w-full p-2.5 border border-gray-300 rounded-lg outline-none text-sm bg-white" value={itemState.date || ''} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, date: e.target.value}})} required />
                                            <input type="text" placeholder="ระบุสิ่งของ (เช่น ข้าวมันไก่)" className="w-full p-2.5 border border-gray-300 rounded-lg outline-none text-sm bg-white" value={itemState.note || ''} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, note: e.target.value}})} required />
                                        </div>
                                    ) : type.hasQuantity ? (
                                        <div className="flex items-center bg-white border rounded-lg overflow-hidden shadow-sm">
                                            <button type="button" className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-lg" onClick={(e) => { e.stopPropagation(); setSelectedItems(prev => ({...prev, [type.id]: {...itemState, quantity: Math.max(1, (itemState.quantity || 1) - 1)}})); }}>-</button>
                                            <input type="number" min="1" className="w-16 text-center border-none bg-transparent font-bold outline-none text-lg" value={itemState.quantity || 1} readOnly />
                                            <button type="button" className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-lg" onClick={(e) => { e.stopPropagation(); setSelectedItems(prev => ({...prev, [type.id]: {...itemState, quantity: (itemState.quantity || 1) + 1}})); }}>+</button>
                                        </div>
                                    ) : (
                                        <div className="relative w-full">
                                            <input type="number" min="1" placeholder="ระบุจำนวนเงิน" className="w-full p-3 pr-12 border border-gray-300 rounded-lg outline-none bg-white font-bold text-orange-600 text-lg shadow-sm" value={itemState.amount} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, amount: e.target.value}})} onClick={e => e.stopPropagation()} />
                                            <span className="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 font-medium">บาท</span>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    );
                })

                        <div className="fixed inset-0 bg-black/70 z-[150] flex flex-col items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={cancelSlipQr}>

                                <div className="bg-white p-3 rounded-2xl shadow-sm border-2 border-gray-100 mb-6">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?uploadSession=' + currentUploadSession)}`} alt="Upload QR" className="w-48 h-48" />
                                </div>
                                <div className="flex items-center text-gray-400 text-sm animate-pulse"><Loader className="w-4 h-4 mr-2 animate-spin" /> กำลังรอรับรูปสลิป...</div>
                            </div>
                        </div>
                    )}
                    
                    <div className={`bg-gradient-to-r from-${theme}-600 to-${theme}-500 px-6 py-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2`}>
                        <h2 className="text-xl sm:text-2xl font-bold text-white flex items-center"><PlusCircle className="w-7 h-7 mr-3 opacity-90" /> {userRole === 'donor' ? 'ฟอร์มแจ้งความประสงค์บริจาค' : 'ระบบบันทึกรับเงินบริจาค'}</h2>
                        <span className={`text-xs sm:text-sm font-bold bg-white text-${theme}-700 px-3 py-1.5 rounded-full shadow-sm`}>{userRole === 'donor' ? 'รอตรวจสอบ' : 'อนุมัติอัตโนมัติ'}</span>
                    </div>

                    <form onSubmit={handleSubmit} className="p-4 sm:p-6 bg-gray-50/50">
                        {/* 70/30 Split สำหรับเจ้าหน้าที่ */}
                        {(userRole === 'staff' || userRole === 'admin') ? (
                            <div className="grid grid-cols-1 lg:grid-cols-10 gap-6 lg:gap-8">
                                {/* ส่วนซ้าย 70% */}
                                <div className="lg:col-span-7 flex flex-col gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex-grow space-y-5">
                                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 flex items-center"><User className="w-5 h-5 mr-2 text-gray-500"/> ข้อมูลผู้บริจาค</h3>
                                        <div className="grid grid-cols-2 gap-4 text-xs text-gray-500 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                            <div><span className="font-semibold block text-gray-400">ID อ้างอิง:</span><span className="text-gray-800 font-mono">อัตโนมัติ</span></div>
                                            <div><span className="font-semibold block text-gray-400">ผู้ทำรายการ:</span><span className="text-gray-800 font-medium">{loggedInUser ? loggedInUser.name : 'ผู้บริจาค (ออนไลน์)'}</span></div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1.5">ชื่อ - สกุล ผู้บริจาค (พิมพ์ได้หลายคน/ครอบครัว) <span className="text-red-500">*</span></label>
                                            <textarea rows="2" required className={`w-full p-3 text-lg font-medium border border-gray-300 rounded-xl focus:ring-2 focus:ring-${theme}-500 outline-none bg-gray-50 focus:bg-white resize-none`} value={name} onChange={e => setName(e.target.value)} placeholder="เช่น ครอบครัวมีสุข, นาย A และ นาง B"></textarea>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2">
                                                <label className="block text-sm font-bold text-gray-700 mb-1.5">ช่องทางการรับเงิน</label>
                                                <select className={`w-full p-3 text-base border border-gray-300 rounded-xl outline-none bg-gray-50 focus:bg-white focus:ring-2 focus:ring-${theme}-500 font-medium text-blue-700`} value={method} onChange={e => setMethod(e.target.value)}>
                                                    <option value="เงินสด">💵 เงินสด (หน้าตู้)</option><option value="เงินโอน">📱 โอนเงินเข้าบัญชี</option><option value="อื่นๆ">🔖 อื่นๆ</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-center mb-1.5">
                                                <label className="block text-sm font-bold text-gray-700">หมายเหตุ / คำอวยพร</label>
                                                <button type="button" onClick={handleGenerateBlessing} disabled={isGeneratingBlessing || !name} className="text-xs bg-orange-50 text-orange-600 px-2 py-1 rounded-md flex items-center border border-orange-200">
                                                    {isGeneratingBlessing ? <Loader className="w-3 h-3 animate-spin mr-1"/> : <Sparkles className="w-3 h-3 mr-1"/>} สร้างคำอวยพร
                                                </button>
                                            </div>
                                            <textarea rows="2" className={`w-full p-3 border border-gray-300 rounded-xl outline-none bg-gray-50 focus:bg-white focus:ring-2 focus:ring-${theme}-500 resize-none text-sm`} value={generalNote} onChange={e => setGeneralNote(e.target.value)} placeholder="ข้อความเพิ่มเติม..."></textarea>
                                        </div>
                                        {method === 'เงินโอน' && (
                                             <div className="pt-2">
                                                <label className="block text-sm font-bold text-gray-700 mb-1.5">หลักฐานการโอน (เจ้าหน้าที่ไม่บังคับแนบ)</label>
                                                <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                                                    <label className="cursor-pointer border border-gray-300 rounded-xl px-4 py-2 hover:bg-gray-50 transition-colors bg-white flex items-center flex-grow w-full">
                                                        <UploadCloud className="w-5 h-5 text-gray-400 mr-2" /><span className="text-sm font-medium text-gray-600">อัปโหลดจากเครื่อง</span>
                                                        <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                                    </label>
                                                    <span className="text-gray-400 text-sm">หรือ</span>
                                                    <button type="button" onClick={generateSlipQr} className={`flex-grow w-full sm:w-auto bg-${theme}-100 text-${theme}-700 border border-${theme}-200 px-4 py-2 rounded-xl font-medium text-sm flex items-center justify-center`}>
                                                        <QrCode className="w-5 h-5 mr-2" /> สแกนจากมือถือ
                                                    </button>
                                                </div>
                                                {slipImage && (<div className="mt-4 relative inline-block animate-bounce-in"><img src={slipImage} alt="slip" className="h-24 object-contain rounded-lg border-2 border-orange-200 bg-white p-1 shadow-sm"/><button type="button" onClick={() => setSlipImage(null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600"><X className="w-3 h-3" /></button></div>)}
                                             </div>
                                        )}
                                    </div>
                                </div>
                                {/* ส่วนขวา 30% */}
                                <div className="lg:col-span-3 flex flex-col gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex-grow flex flex-col">
                                        <div className="flex items-center justify-between border-b pb-3 mb-4">
                                            <h3 className="text-lg font-bold text-gray-800 flex items-center"><ShoppingBag className="w-5 h-5 mr-2 text-gray-500"/> รายการบริจาค</h3>
                                        </div>
                                        <div className="flex flex-col gap-3 mb-6 overflow-y-auto pr-2 flex-grow" style={{maxHeight: 'calc(100vh - 350px)', minHeight: '200px'}}>
                                            {renderDonationItems()}
                                        </div>
                                        <div className="mt-auto pt-4 border-t-2 border-gray-100 border-dashed space-y-5">
                                            <div className={`bg-gradient-to-r from-${theme}-50 to-white p-4 rounded-2xl flex flex-col items-center border border-${theme}-200 shadow-inner`}>
                                                <span className="text-gray-700 font-bold text-sm mb-1">ยอดรวมทั้งสิ้น</span>
                                                <div className="text-center">
                                                    <span className={`text-4xl font-extrabold text-${theme}-600 tracking-tight`}>{totalAmount.toLocaleString()}</span>
                                                    <span className={`text-sm font-bold text-${theme}-600 ml-1`}>฿</span>
                                                </div>
                                            </div>
                                            <button type="submit" disabled={isUploading || isGeneratingBlessing} className={`w-full text-white font-bold py-4 px-2 rounded-2xl shadow-lg flex justify-center items-center text-lg transition-transform hover:-translate-y-1 ${(isUploading || isGeneratingBlessing) ? 'bg-gray-400 cursor-not-allowed' : `bg-gradient-to-r from-${theme}-600 to-${theme}-500`}`}>
                                                {(isUploading || isGeneratingBlessing) ? <><Loader className="w-6 h-6 animate-spin mr-2"/> รอก่อน...</> : <><CheckCircle className="w-6 h-6 mr-2 shrink-0" /> บันทึกรับเงิน</>}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* สำหรับหน้าจอมือถือ/ผู้บริจาค (1 Column) */
                            <div className="space-y-6 max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <div className="grid grid-cols-2 gap-4 text-sm text-gray-500 bg-gray-50 p-3 rounded-xl border border-gray-100"><div><span className="font-semibold text-gray-400 block">ID อ้างอิง:</span><span className="font-mono">อัตโนมัติ</span></div><div><span className="font-semibold text-gray-400 block">ผู้ทำรายการ:</span><span>{loggedInUser ? loggedInUser.name : 'ผู้บริจาค (ออนไลน์)'}</span></div></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-2">ชื่อ - สกุล ผู้บริจาค (พิมพ์ครอบครัวได้) <span className="text-red-500">*</span></label><textarea rows="3" required className={`w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-${theme}-500 outline-none text-lg resize-none`} value={name} onChange={e => setName(e.target.value)} placeholder="เช่น ครอบครัวมีสุข, นาย A และ นาง B"></textarea></div>
                                <div className="space-y-3"><label className="block text-sm font-bold text-gray-700">เลือกประเภทการบริจาค</label>{renderDonationItems()}</div>
                                <div className={`bg-${theme}-50 p-5 rounded-2xl flex justify-between items-center border border-${theme}-200`}><span className="text-gray-700 font-bold text-lg">ยอดรวมทั้งสิ้น</span><span className={`text-3xl font-extrabold text-${theme}-600`}>{totalAmount.toLocaleString()} <span className="text-base">บาท</span></span></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-2">ช่องทางการบริจาค</label><select className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white font-medium" value={method} onChange={e => setMethod(e.target.value)}><option value="เงินโอน">📱 โอนเงินเข้าบัญชีวัด</option><option value="เงินสด">💵 เงินสด</option><option value="อื่นๆ">🔖 อื่นๆ</option></select></div>
                                <div className="bg-gray-50 rounded-xl border border-gray-200 p-4">
                                    {method === 'เงินโอน' ? (
                                        <div className="space-y-4 text-center">
                                            <div className="animate-fade-in"><p className="text-sm font-bold text-gray-700 mb-2">1. สแกน QR Code เพื่อโอนเงิน</p><div className="bg-white p-3 rounded-xl shadow-sm border inline-block"><img src={settings.qrCodeUrl} alt="QR Code" className="w-40 h-40 object-contain" /></div><p className="text-xs text-gray-500 mt-2">{settings.bankInfo?.bankName} | {settings.bankInfo?.accountName}</p><p className={`text-xl font-mono font-bold text-${theme}-700 mt-1 select-all`}>{settings.bankInfo?.accountNumber}</p></div>
                                            <div className="border-t border-gray-200 pt-4"><p className="text-sm font-bold text-gray-700 mb-2">{settings.requireSlip !== false ? '2. แนบหลักฐานการโอน *' : '2. แนบหลักฐานการโอน (ถ้ามี)'}</p><label className="cursor-pointer block border-2 border-dashed border-gray-300 rounded-xl p-6 hover:bg-gray-50 transition-colors bg-white"><div className="flex flex-col items-center justify-center">{isUploading ? <Loader className="w-8 h-8 animate-spin text-orange-400 mb-2" /> : <UploadCloud className="w-8 h-8 text-gray-400 mb-2" />}<span className="text-sm font-medium text-gray-600">{slipImage ? 'คลิกเพื่อเปลี่ยนรูปสลิป' : 'คลิกเพื่อเลือกรูปสลิป'}</span></div><input type="file" accept="image/*" className="hidden" onChange={handleFileChange} /></label>{slipImage && (<div className="mt-4 relative inline-block animate-bounce-in"><img src={slipImage} alt="Preview" className="h-32 object-contain rounded-lg border-2 border-orange-200 bg-white p-1 shadow-sm" /><button type="button" onClick={() => setSlipImage(null)} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1.5 shadow-md hover:bg-red-600 hover:scale-110 transition-transform"><X className="w-4 h-4" /></button></div>)}</div>
                                        </div>
                                    ) : (<div className="flex flex-col items-center justify-center text-gray-500 py-6"><ShoppingBag className="w-12 h-12 mb-3 opacity-20" /><p className="text-sm font-medium">กรุณานำเงินสดมาบริจาคที่จุดรับบริจาค</p></div>)}
                                </div>
                                <div><div className="flex justify-between items-center mb-2"><label className="block text-sm font-bold text-gray-700">หมายเหตุ / คำอวยพร</label><button type="button" onClick={handleGenerateBlessing} disabled={isGeneratingBlessing || !name} className="text-xs bg-orange-50 text-orange-600 px-3 py-1.5 rounded-lg flex items-center border border-orange-200">{isGeneratingBlessing ? <Loader className="w-3 h-3 animate-spin mr-1"/> : <Sparkles className="w-3 h-3 mr-1"/>} สร้างคำอวยพร</button></div><textarea rows="3" className="w-full p-3 border border-gray-300 rounded-xl outline-none resize-none" value={generalNote} onChange={e => setGeneralNote(e.target.value)} placeholder="ข้อความเพิ่มเติม..."></textarea></div>
                                <button type="submit" disabled={isUploading || isGeneratingBlessing} className={`w-full text-white font-bold py-4 px-4 rounded-2xl shadow-lg flex justify-center items-center text-lg hover:-translate-y-1 ${(isUploading || isGeneratingBlessing) ? 'bg-gray-400' : `bg-gradient-to-r from-${theme}-600 to-${theme}-500`}`}>{(isUploading || isGeneratingBlessing) ? 'กำลังประมวลผล...' : <><CheckCircle className="w-6 h-6 mr-2 shrink-0" /> ยืนยันการบริจาค</>}</button>
                            </div>
                        )}
                    </form>
                </div>
            );
        }
// ==========================================
        // DataTables-style Dashboard (อัปเดตหน้าพิมพ์รายงานตามแบบฟอร์ม)
        // ==========================================
        function Dashboard({ donations, userRole, onUpdateDonation, onDeleteDonation, showNotification, settings }) {
            const [editingDonation, setEditingDonation] = useState(null);
            const [viewSlip, setViewSlip] = useState(null);
            const [itemToDelete, setItemToDelete] = useState(null); 
            const [viewReceipt, setViewReceipt] = useState(null); 
            
            const [showExportModal, setShowExportModal] = useState(false);
            const [exportCols, setExportCols] = useState({
                id: false, date: true, time: true, name: true, purpose: true, amount: true, method: true, status: true, note: true, recordedBy: true
            });

            const [filterDate, setFilterDate] = useState('');
            const [filterMethod, setFilterMethod] = useState('all');
            const [filterType, setFilterType] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10);

            const [aiSummary, setAiSummary] = useState('');
            const [isGeneratingAi, setIsGeneratingAi] = useState(false);

            const filteredData = donations.filter(d => {
                let isValid = true;
                if (filterDate && new Date(d.dateTime).toLocaleDateString('en-CA') !== filterDate) isValid = false;
                if (filterMethod !== 'all' && d.method !== filterMethod) isValid = false;
                if (filterType !== 'all') {
                    if (filterType === 'roong_taan') { if (!d.roongTaanDate && !d.purpose.includes('โรงทาน')) isValid = false; } 
                    else if (filterType === 'thai_taan') { if (!d.purpose.includes('ไทยทาน')) isValid = false; } 
                    else if (filterType === 'hua_wat') { if (!d.purpose.includes('หัววัด')) isValid = false; } 
                    else if (filterType === 'general') { if (d.roongTaanDate || d.purpose.includes('ไทยทาน') || d.purpose.includes('หัววัด')) isValid = false; }
                }
                if (searchTerm && !`${d.name} ${d.purpose} ${d.generalNote} ${d.method} ${d.id}`.toLowerCase().includes(searchTerm.toLowerCase())) isValid = false;
                return isValid;
            });

            const totalAmount = filteredData.reduce((sum, d) => d.status === 'approved' ? sum + (Number(d.amount) || 0) : sum, 0);

            const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const paginatedData = filteredData.slice(indexOfFirstItem, indexOfLastItem);

            useEffect(() => { setCurrentPage(1); }, [filterDate, filterMethod, filterType, searchTerm, itemsPerPage]);
            
            const handleExportCSV = () => {
                const headers = [];
                if(exportCols.id) headers.push("รหัสอ้างอิง"); if(exportCols.date) headers.push("วันที่"); if(exportCols.time) headers.push("เวลา"); if(exportCols.name) headers.push("ชื่อ-สกุล"); if(exportCols.purpose) headers.push("รายการบริจาค"); if(exportCols.amount) headers.push("จำนวนเงิน"); if(exportCols.method) headers.push("ช่องทาง"); if(exportCols.status) headers.push("สถานะ"); if(exportCols.note) headers.push("หมายเหตุ"); if(exportCols.recordedBy) headers.push("ผู้บันทึก");

                const rows = filteredData.map(d => {
                    const row = []; const dateObj = d.dateTime ? new Date(d.dateTime) : null;
                    if(exportCols.id) row.push(d.id || '-'); if(exportCols.date) row.push(dateObj ? dateObj.toLocaleDateString('th-TH') : '-'); if(exportCols.time) row.push(dateObj ? dateObj.toLocaleTimeString('th-TH') : '-'); if(exportCols.name) row.push(`"${(d.name || '').replace(/"/g, '""')}"`); if(exportCols.purpose) row.push(`"${(d.purpose || '').replace(/"/g, '""')}"`); if(exportCols.amount) row.push(d.amount || 0); if(exportCols.method) row.push(d.method || '-'); if(exportCols.status) row.push(d.status === 'approved' ? 'อนุมัติ' : d.status === 'pending' ? 'รอตรวจ' : 'ปฏิเสธ'); if(exportCols.note) row.push(`"${(d.generalNote || '').replace(/"/g, '""')}"`); if(exportCols.recordedBy) row.push(`"${(d.recordedBy || 'ออนไลน์').replace(/"/g, '""')}"`);
                    return row;
                });
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `donation_report_${filterDate || 'all'}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link); setShowExportModal(false);
            };

            const resetFilters = () => { setFilterDate(''); setFilterMethod('all'); setFilterType('all'); setSearchTerm(''); };

            const handlePrintReport = () => {
                const style = document.createElement('style'); style.id = 'report-print-page-style'; style.innerHTML = `@page { size: A4 portrait; margin: 15mm; }`; document.head.appendChild(style);
                const cleanup = () => { const st = document.getElementById('report-print-page-style'); if (st) st.remove(); window.removeEventListener('afterprint', cleanup); };
                window.addEventListener('afterprint', cleanup); window.print();
            };

            const printDateDisplay = filterDate ? new Date(filterDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : "ทั้งหมด";

            const getPrintTypeName = () => {
                if (filterType === 'roong_taan') return 'จองโรงทาน';
                if (filterType === 'thai_taan') return 'ไทยทาน';
                if (filterType === 'hua_wat') return 'หัววัด';
                return 'ทั่วไป';
            };

            const handleGenerateAiSummary = async () => {
                if (filteredData.length === 0) return showNotification("ไม่มีข้อมูลให้สรุป", "error");
                setIsGeneratingAi(true);
                try {
                    const methodCounts = filteredData.reduce((acc, d) => { if (d.status === 'approved') acc[d.method] = (acc[d.method] || 0) + 1; return acc; }, {});
                    const topMethod = Object.keys(methodCounts).sort((a,b) => methodCounts[b] - methodCounts[a])[0];
                    const prompt = `ในฐานะผู้ช่วยของวัด ${settings.templeName} สรุปรายงาน:\n- ช่วงเวลา: ${printDateDisplay}\n- ยอดสุทธิ: ${totalAmount.toLocaleString()} บาท\n- รวม: ${filteredData.length} รายการ\n- รอตรวจสอบ: ${filteredData.filter(d=>d.status==='pending').length} รายการ\n- ช่องทางฮิต: ${topMethod || 'ไม่ระบุ'}\nเขียนสรุป 1-2 ย่อหน้า ภาษาทางการ`;
                    const result = await callGemini(prompt);
                    setAiSummary(result.replace(/^["']|["']$/g, ''));
                    showNotification("สร้างสรุปสำเร็จ ✨");
                } catch(e) { showNotification("สร้างสรุปไม่สำเร็จ", "error"); } finally { setIsGeneratingAi(false); }
            };

            return (
                <div className="space-y-6 relative">
                    {/* Modals */}
                    {editingDonation && (<EditModal donation={editingDonation} userRole={userRole} onClose={() => setEditingDonation(null)} onSave={onUpdateDonation} showNotification={showNotification} settings={settings} />)}
                    {viewSlip && (<div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4" onClick={() => setViewSlip(null)}><div className="relative max-w-3xl max-h-full"><img src={viewSlip} className="max-w-full max-h-[90vh] rounded shadow-lg" /><button className="absolute -top-4 -right-4 bg-white rounded-full p-2 shadow" onClick={() => setViewSlip(null)}><X className="w-6 h-6" /></button></div></div>)}
                    {viewReceipt && (<ReceiptModal donation={viewReceipt} settings={settings} onClose={() => setViewReceipt(null)} />)}
                    
                    {itemToDelete && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 text-center animate-scale-up">
                                <AlertTriangle className="w-12 h-12 text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-red-600 mb-2">ยืนยันการลบข้อมูล?</h3>
                                <p className="text-gray-600 mb-4 text-sm">คุณกำลังจะลบข้อมูลของ <strong>{itemToDelete.name}</strong><br/>ไม่สามารถกู้คืนได้</p>
                                <div className="flex gap-2"><button onClick={() => setItemToDelete(null)} className="flex-1 bg-gray-200 py-2 rounded font-bold hover:bg-gray-300">ยกเลิก</button><button onClick={() => { onDeleteDonation(itemToDelete.id); setItemToDelete(null); }} className="flex-1 bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700">ยืนยันลบ</button></div>
                            </div>
                        </div>
                    )}

                    {showExportModal && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6 animate-scale-up">
                                <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800"><Download className="w-5 h-5 mr-2 text-green-600" /> เลือกข้อมูลที่จะโหลด (CSV)</h3>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {Object.entries({ id: 'รหัสอ้างอิง', date: 'วันที่', time: 'เวลา', name: 'ชื่อ-สกุล', purpose: 'รายการบริจาค', amount: 'จำนวนเงิน', method: 'ช่องทาง', status: 'สถานะ', note: 'หมายเหตุ', recordedBy: 'ผู้บันทึก' }).map(([key, label]) => (
                                        <label key={key} className="flex items-center space-x-2 text-sm bg-gray-50 p-2 rounded border cursor-pointer hover:bg-gray-100">
                                            <input type="checkbox" className="rounded text-green-600 focus:ring-green-500" checked={exportCols[key]} onChange={(e) => setExportCols({...exportCols, [key]: e.target.checked})} /><span>{label}</span>
                                        </label>
                                    ))}
                                </div>
                                <div className="flex gap-2"><button onClick={() => setShowExportModal(false)} className="flex-1 bg-gray-200 py-2 rounded font-medium">ยกเลิก</button><button onClick={handleExportCSV} className="flex-1 bg-green-600 text-white py-2 rounded font-bold flex items-center justify-center"><FileText className="w-4 h-4 mr-2" /> โหลดไฟล์</button></div>
                            </div>
                        </div>
                    )}
                    
                    {/* Header Screen */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 no-print">
                        <h2 className="text-xl sm:text-2xl font-bold text-gray-800 flex items-center"><ClipboardList className="w-6 h-6 mr-2 text-orange-600" /> สรุปยอดและรายงาน</h2>
                        <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={handlePrintReport} className="flex-1 sm:flex-none flex items-center justify-center bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded text-sm shadow"><Printer className="w-4 h-4 mr-2" /> พิมพ์รายงานทางการ (PDF)</button>
                            <button onClick={() => setShowExportModal(true)} className="flex-1 sm:flex-none flex items-center justify-center bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded text-sm"><FileText className="w-4 h-4 mr-2" /> โหลด CSV</button>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 no-print">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                            <div className="flex items-center gap-2 text-sm font-medium text-gray-700"><SlidersHorizontal className="w-4 h-4" /> ตัวกรองข้อมูล</div>
                            <div className="relative w-full md:w-72"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Search className="h-4 w-4 text-gray-400" /></div><input type="text" className="w-full pl-10 pr-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-500" placeholder="ค้นหา ชื่อ, รายการ..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                            <div><label className="block text-xs text-gray-500 mb-1">วันที่</label><input type="date" className="w-full p-2 border rounded text-sm" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} /></div>
                            <div><label className="block text-xs text-gray-500 mb-1">ช่องทาง</label><select className="w-full p-2 border rounded text-sm" value={filterMethod} onChange={(e) => setFilterMethod(e.target.value)}><option value="all">ทั้งหมด</option><option value="เงินสด">เฉพาะเงินสด</option><option value="เงินโอน">เฉพาะเงินโอน</option><option value="อื่นๆ">อื่นๆ</option></select></div>
                            <div><label className="block text-xs text-gray-500 mb-1">ประเภทรายการ</label><select className="w-full p-2 border rounded text-sm" value={filterType} onChange={(e) => setFilterType(e.target.value)}><option value="all">ทั้งหมด</option><option value="general">บริจาคทั่วไป</option><option value="thai_taan">ไทยทาน</option><option value="hua_wat">หัววัด</option><option value="roong_taan">โรงทาน</option></select></div>
                            <div className="flex items-end"><button onClick={resetFilters} className="w-full p-2 bg-gray-100 text-gray-600 rounded text-sm hover:bg-gray-200 font-medium">ล้างตัวกรอง</button></div>
                        </div>
                    </div>

                    {/* Summary Cards */}
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6 no-print">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center col-span-2 md:col-span-1"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">ยอดรวม (ตามตัวกรอง)</span><span className="text-2xl sm:text-3xl font-bold text-green-600">{totalAmount.toLocaleString()} ฿</span></div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">จำนวนรายการ</span><span className="text-2xl sm:text-3xl font-bold text-blue-600">{filteredData.length}</span></div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">รอตรวจ</span><span className="text-2xl sm:text-3xl font-bold text-orange-500">{filteredData.filter(d=>d.status==='pending').length}</span></div>
                    </div>

                    <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 rounded-xl shadow-sm border border-indigo-100 mb-6 no-print">
                        <div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold flex items-center text-indigo-800"><Sparkles className="w-5 h-5 mr-2" /> วิเคราะห์และสรุปยอดด้วย AI</h3><button onClick={handleGenerateAiSummary} disabled={isGeneratingAi || filteredData.length === 0} className="text-sm bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium flex items-center">{isGeneratingAi ? <Loader className="w-4 h-4 mr-2 animate-spin"/> : <Sparkles className="w-4 h-4 mr-2"/>} สร้างบทสรุป ✨</button></div>
                        {aiSummary ? (<div className="bg-white p-5 rounded-lg border text-gray-700 leading-relaxed whitespace-pre-wrap text-sm shadow-inner">{aiSummary}</div>) : (<div className="text-center py-4 text-indigo-300 bg-white/50 rounded-lg border border-dashed text-sm">คลิกปุ่ม "สร้างบทสรุป" เพื่อให้ AI ช่วยสรุปรายงานภาพรวมให้คุณอัตโนมัติ</div>)}
                    </div>

                    {/* DataTables Display */}
                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden no-print">
                        <div className="p-4 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50 text-sm text-gray-600">
                            <div>แสดง <select className="mx-2 border rounded p-1 outline-none" value={itemsPerPage} onChange={(e) => setItemsPerPage(Number(e.target.value))}><option value={10}>10</option><option value={20}>20</option><option value={50}>50</option><option value={100}>100</option></select> รายการ</div>
                            <div>พบข้อมูลทั้งหมด <span className="font-bold text-orange-600">{filteredData.length}</span> รายการ</div>
                        </div>
                        <div className="overflow-x-auto min-h-[300px]">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">ลำดับ</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">วัน-เวลา</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ผู้บริจาค</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">รายการ</th>
                                        <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">ยอดเงิน</th>
                                        <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">ช่องทาง</th>
                                        <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">สถานะ</th>
                                        {(userRole === 'admin' || userRole === 'staff') && <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">จัดการ</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-200 text-sm">
                                    {paginatedData.length > 0 ? paginatedData.map((d, index) => (
                                        <tr key={d.id} className="hover:bg-gray-50">
                                            <td className="px-4 py-3 text-center text-gray-500">{indexOfFirstItem + index + 1}</td>
                                            <td className="px-4 py-3"><div className="text-gray-900">{d.dateTime ? new Date(d.dateTime).toLocaleDateString('th-TH') : '-'}</div><div className="text-xs text-gray-500">{d.dateTime ? new Date(d.dateTime).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) : '-'}</div></td>
                                            <td className="px-4 py-3 font-bold text-gray-900">{d.name}</td>
                                            <td className="px-4 py-3"><div className="text-gray-900 line-clamp-2">{d.purpose}</div>{d.roongTaanDate && <div className="text-xs text-orange-600">โรงทาน: {d.roongTaanDate} ({d.roongTaanNote})</div>}</td>
                                            <td className="px-4 py-3 text-right font-bold text-gray-900">{(d.amount || 0).toLocaleString()}</td>
                                            <td className="px-4 py-3 text-center text-gray-600">{d.method}</td>
                                            <td className="px-4 py-3 text-center"><span className={`px-2 py-1 text-xs rounded-full ${d.status==='approved'?'bg-green-100 text-green-800':d.status==='pending'?'bg-yellow-100 text-yellow-800':'bg-red-100 text-red-800'}`}>{d.status==='approved'?'อนุมัติ':d.status==='pending'?'รอตรวจ':'ปฏิเสธ'}</span></td>
                                            {(userRole === 'admin' || userRole === 'staff') && (
                                                <td className="px-4 py-3 text-center">
                                                    <div className="flex justify-center items-center gap-1">
                                                        {d.status === 'approved' && <button onClick={() => setViewReceipt(d)} className="text-gray-400 hover:text-green-600 p-1.5 rounded bg-white hover:bg-green-50 border transition shadow-sm"><Printer className="w-4 h-4" /></button>}
                                                        <button onClick={() => setEditingDonation(d)} className="text-gray-400 hover:text-orange-600 p-1.5 rounded bg-white hover:bg-orange-50 border transition shadow-sm"><Pencil className="w-4 h-4" /></button>
                                                        {userRole === 'admin' && <button onClick={() => setItemToDelete(d)} className="text-gray-400 hover:text-red-600 p-1.5 rounded bg-white hover:bg-red-50 border transition shadow-sm"><Trash2 className="w-4 h-4" /></button>}
                                                    </div>
                                                </td>
                                            )}
                                        </tr>
                                    )) : (<tr><td colSpan="9" className="text-center py-8 text-gray-500">ไม่พบข้อมูล</td></tr>)}
                                </tbody>
                            </table>
                        </div>
                        {filteredData.length > 0 && (<div className="p-4 border-t flex justify-between items-center bg-gray-50 text-sm text-gray-500"><div>แสดงที่ {indexOfFirstItem + 1} ถึง {Math.min(indexOfLastItem, filteredData.length)} จาก {filteredData.length}</div><div className="flex gap-2"><button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-3 py-1.5 border rounded bg-white disabled:opacity-50"><ChevronLeft className="w-4 h-4 inline mr-1" />ก่อนหน้า</button><span className="font-medium mx-2 my-auto">หน้า {currentPage} / {totalPages}</span><button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages || totalPages === 0} className="px-3 py-1.5 border rounded bg-white disabled:opacity-50">ถัดไป <ChevronRight className="w-4 h-4 inline ml-1" /></button></div></div>)}
                    </div>

                    {/* ========================================= */}
                    {/* พิมพ์รายงาน A4 (อัปเดตเลย์เอาต์ใหม่ตามแบบฟอร์ม PDF) */}
                    {/* ========================================= */}
                    <div className="print-container print-only">
                        <div className="mb-6 relative">

                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function AnnouncerPanel({ donations, onUpdateStatus, settings }) {
            const approvedDonations = useMemo(() => donations.filter(d => d.status === 'approved'), [donations]);

            const announcedHistory = useMemo(() => approvedDonations.filter(d => d.announced).sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime)), [approvedDonations]);
            const currentDonor = waitingQueue.length > 0 ? waitingQueue[0] : null;

                <div className="space-y-6">
                    <div className="flex items-center justify-between mb-2"><h2 className="text-2xl font-bold text-gray-800 flex items-center"><Megaphone className={`w-7 h-7 mr-2 text-${theme}-600`} /> สำหรับโฆษก / ประกาศรายชื่อ</h2><div className={`text-sm bg-${theme}-100 text-${theme}-800 px-3 py-1 rounded-full border border-${theme}-200`}>รอประกาศ: <strong>{waitingQueue.length}</strong> | ประกาศแล้ว: <strong>{announcedHistory.length}</strong></div></div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

ull shadow-lg mx-auto hover:bg-${theme}-700 transition hover:scale-105 flex justify-center items-center`}><Megaphone className="w-8 h-8 mr-3" /> ประกาศแล้ว (ถัดไป)</button></div>) : (<div className="text-gray-400"><CheckCircle className="w-20 h-20 mb-4 mx-auto opacity-50" /><h3 className="text-3xl font-bold">ประกาศครบแล้ว</h3></div>)}</div></div>
                        <div className="space-y-6">
                            <div className="bg-white rounded-xl shadow border p-4 max-h-[300px] overflow-y-auto"><h3 className="text-lg font-bold mb-3 border-b pb-2 sticky top-0 bg-white"><div className="w-2 h-2 inline-block rounded-full bg-yellow-400 mr-2"></div> คิวรอถัดไป</h3>{waitingQueue.slice(1).length > 0 ? (<ul className="space-y-2">{waitingQueue.slice(1).map(d => (<li key={d.id} className="p-3 bg-gray-50 rounded border flex justify-between items-center"><div className="truncate mr-2"><div className="font-medium truncate">{d.name}</div><div className="text-xs text-gray-400">{d.dateTime ? new Date(d.dateTime).toLocaleTimeString('th-TH') : '-'}</div></div><span className={`text-${theme}-600 font-bold`}>{(d.amount || 0).toLocaleString()}</span></li>))}</ul>) : (<p className="text-gray-400 text-sm text-center py-4">ไม่มีคิวรอ</p>)}</div>
                            <div className="bg-white rounded-xl shadow border p-4 max-h-[300px] overflow-y-auto"><h3 className="text-lg font-bold mb-3 border-b pb-2 sticky top-0 bg-white"><div className="w-2 h-2 inline-block rounded-full bg-green-500 mr-2"></div> ประกาศแล้ว</h3>{announcedHistory.length > 0 ? (<ul className="space-y-2">{announcedHistory.map(d => (<li key={d.id} className="p-3 bg-green-50 border border-green-100 rounded flex justify-between items-center group"><div className="truncate mr-2"><span className="font-medium truncate block">{d.name}</span><span className="text-xs text-green-600">ประกาศแล้ว</span></div><button onClick={() => onUpdateStatus(d.id, false)} className="text-gray-400 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition"><RotateCcw className="w-4 h-4" /></button></li>))}</ul>) : (<p className="text-gray-400 text-sm text-center py-4">ยังไม่มีประวัติ</p>)}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // App Layout / System Routes
        // ==========================================
        function DonationSystem({ onBack, donations, settings, onAdd, onUpdate, onDelete, onUpdateSettings, onClearData, showNotification, loggedInUser, setLoggedInUser }) {
            const [activeTab, setActiveTab] = useState('donate');
            const theme = settings.themeColor || 'orange';
            const userRole = loggedInUser?.role || 'donor';
            const isAuthenticated = !!loggedInUser;
            const perms = loggedInUser?.permissions || [];

            const canAccess = (tab) => {
                if (userRole === 'admin') return true; 
                if (userRole === 'staff') return perms.includes(tab);
                return tab === 'donate'; 
            };

            useEffect(() => {
                if (isAuthenticated && userRole === 'staff') {
                    if (perms.includes('donate')) setActiveTab('donate');
                    else if (perms.includes('dashboard')) setActiveTab('dashboard');
                    else if (perms.includes('announcer')) setActiveTab('announcer');
                    else if (perms.includes('news')) setActiveTab('news');
                    else if (perms.includes('approval')) setActiveTab('approval');
                }
            }, [isAuthenticated, userRole, perms]);

            const toggleAnnounced = (id, status) => { const item = donations.find(d => d.id === id); if (item) onUpdate({ ...item, announced: status }); };

            return (
                <div className={`min-h-screen bg-${theme}-50 text-gray-800`}>
                    <header className={`bg-${theme}-600 text-white shadow-md no-print`}>
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                <button onClick={onBack} className={`p-2 bg-${theme}-700 hover:bg-${theme}-800 rounded-full`} title="กลับหน้าแรก"><ArrowLeft className="w-6 h-6" /></button>
                                <div><h1 className="text-xl sm:text-2xl font-bold">ระบบจัดการ{settings.templeName}</h1><p className={`text-xs sm:text-sm text-${theme}-200`}>ควบคุมระบบภายใน</p></div>
                            </div>
                            <div className="flex items-center gap-2 w-full sm:w-auto justify-between sm:justify-end">
                                {isAuthenticated && (<div className={`flex items-center gap-3 bg-${theme}-700 px-4 py-2 rounded-lg`}><div className="flex items-center gap-2"><User className={`w-5 h-5 text-${theme}-200`} /><span className="font-medium text-sm">{loggedInUser.name} ({userRole === 'admin' ? 'Admin' : 'Staff'})</span></div><button onClick={()=>window.location.reload()} className="bg-red-500 p-1 rounded" title="ออกจากระบบ"><LogOut className="w-4 h-4" /></button></div>)}
                            </div>
                        </div>
                    </header>
                    <nav className="bg-white shadow-sm sticky top-0 z-10 no-print">
                        <div className="max-w-7xl mx-auto px-4"><div className="flex space-x-4 overflow-x-auto hide-scrollbar">
                            {canAccess('donate') && <button onClick={() => setActiveTab('donate')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'donate' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><PlusCircle className="w-5 h-5 mr-2" /> บันทึกรับบริจาค</button>}
                            {canAccess('dashboard') && <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'dashboard' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><ClipboardList className="w-5 h-5 mr-2" /> สรุป/รายงาน</button>}
                            {canAccess('announcer') && <button onClick={() => setActiveTab('announcer')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'announcer' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><Megaphone className="w-5 h-5 mr-2" /> โฆษก/ประกาศ</button>}
                            {canAccess('approval') && <button onClick={() => setActiveTab('approval')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'approval' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><CheckCircle className="w-5 h-5 mr-2" /> อนุมัติรายการ {donations.filter(d => d.status === 'pending').length > 0 && <span className="ml-2 bg-red-500 text-white text-xs px-2 py-1 rounded-full">{donations.filter(d => d.status === 'pending').length}</span>}</button>}
                            {userRole === 'admin' && <button onClick={() => setActiveTab('settings')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'settings' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><Settings className="w-5 h-5 mr-2" /> ตั้งค่าระบบ</button>}
                            {isAuthenticated && <button onClick={() => setActiveTab('account')} className={`px-4 py-3 border-b-2 font-medium whitespace-nowrap ${activeTab === 'account' ? `border-${theme}-500 text-${theme}-600` : 'border-transparent text-gray-500'} flex items-center`}><UserCog className="w-5 h-5 mr-2" /> บัญชีของฉัน</button>}
                        </div></div>
                    </nav>
                    <main className="max-w-7xl mx-auto px-4 py-8 pb-20"> 
                        {activeTab === 'donate' && <DonationForm loggedInUser={loggedInUser} userRole={userRole} settings={settings} onSave={onAdd} showNotification={showNotification} />}
                        {activeTab === 'dashboard' && <Dashboard donations={donations} userRole={userRole} onUpdateDonation={onUpdate} onDeleteDonation={onDelete} showNotification={showNotification} settings={settings} />}
                        {activeTab === 'announcer' && <AnnouncerPanel donations={donations} onUpdateStatus={toggleAnnounced} settings={settings} />}
                        {activeTab === 'approval' && <ApprovalPanel donations={donations} onApprove={(id) => { const item = donations.find(d => d.id === id); if (item) onUpdate({ ...item, status: 'approved' }); }} onReject={(id) => { const item = donations.find(d => d.id === id); if (item) onUpdate({ ...item, status: 'rejected' }); }} />}
                        {activeTab === 'settings' && userRole === 'admin' && <AdminSettingsPanel settings={settings} onSave={onUpdateSettings} onClearData={onClearData} />}
                        {activeTab === 'account' && isAuthenticated && <UserSettingsPanel loggedInUser={loggedInUser} setLoggedInUser={setLoggedInUser} settings={settings} onSave={onUpdateSettings} showNotification={showNotification} />}
                    </main>
                </div>
            );
        }

        function OfficialWebsite({ onNavigate, donations, settings, setLoggedInUser, showNotification, onUpdateSettings }) {
            const [isScrolled, setIsScrolled] = useState(false); const [showLoginModal, setShowLoginModal] = useState(false);

            useEffect(() => { const handleScroll = () => setIsScrolled(window.scrollY > 50); window.addEventListener('scroll', handleScroll); return () => window.removeEventListener('scroll', handleScroll); }, []);

            return (
                <div className={`min-h-screen bg-${theme}-50 text-gray-800 scroll-smooth`}>
                    {showLoginModal && <LoginScreen settings={settings} onClose={() => setShowLoginModal(false)} onUpdateSettings={onUpdateSettings} showNotification={showNotification} onLoginSuccess={(u) => { setLoggedInUser(u); setShowLoginModal(false); onNavigate('donate-system'); showNotification(`ยินดีต้อนรับคุณ ${u.name}`); }} />}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/85 backdrop-blur-lg shadow-lg border-b border-white/20 py-2' : 'bg-transparent py-4'} top-0`}>
                        <div className="max-w-7xl mx-auto px-4"><div className="flex justify-between items-center"><div className="flex items-center gap-3"><div className={`w-10 h-10 rounded-full flex items-center justify-center ${isScrolled ? `bg-${theme}-600 text-white` : `bg-white/90 text-${theme}-600`}`}><BookOpen className="w-6 h-6" /></div><span className={`text-xl font-bold tracking-wide ${isScrolled ? `text-${theme}-800` : 'text-white drop-shadow-md'}`}>{settings.templeName}</span></div>
                        <div className="flex items-center gap-3">
                            {settings.systemStatus === 'open' && <button onClick={() => { setLoggedInUser(null); onNavigate('donate-system'); }} className={`bg-gradient-to-r from-orange-500 to-amber-500 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition`}>ร่วมทำบุญออนไลน์</button>}
                            <button onClick={() => setShowLoginModal(true)} className="bg-gray-900 text-white px-5 py-2 rounded-full font-medium flex items-center hover:scale-105 transition"><Lock className="w-4 h-4 mr-2" />ผู้ดูแลระบบ</button>
                        </div></div></div>
                    </nav>
                    <section className="relative h-screen flex items-center justify-center bg-gray-900 overflow-hidden">
                        <div className="absolute inset-0 w-full h-full"><img src={settings.bannerUrl} className="w-full h-full object-cover opacity-50 scale-105" /><div className="absolute inset-0 bg-gradient-to-br from-black/90 via-black/40 to-transparent"></div></div>
                        <div className="relative z-20 text-center px-4 mt-20"><span className={`block text-${theme}-400 font-bold tracking-widest mb-4`}>ยินดีต้อนรับสู่</span><h1 className="text-5xl md:text-7xl font-bold text-white mb-6 drop-shadow-2xl">{settings.templeName}</h1><p className="text-lg md:text-2xl text-gray-300 mb-10 max-w-2xl mx-auto">ระบบจัดการข้อมูลการบริจาคและออกใบอนุโมทนาบัตรอิเล็กทรอนิกส์</p><div className="mb-12 inline-block animate-float"><div className="backdrop-blur-xl bg-white/10 border border-white/20 rounded-[2rem] p-8 shadow-xl"><p className={`text-${theme}-200 text-sm font-semibold mb-2`}>ยอดบริจาครวมทั้งหมด</p><div className="text-5xl md:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-400">฿ {(totalAmount || 0).toLocaleString()}</div></div></div></div>
