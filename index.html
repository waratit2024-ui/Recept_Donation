        // ==========================================
        // 7. APP & ROOT
        // ==========================================
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const uploadSessionId = urlParams.get('uploadSession');

            const [currentRoute, setCurrentRoute] = useState('home');
            const [donations, setDonations] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [notification, setNotification] = useState(null);
            const [loggedInUser, setLoggedInUser] = useState(null);

            const showNotification = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { setLoading(false); } }; initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); if(!u) setLoading(false); }); return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, 'settings', 'config'), (docSnap) => {
                    if (docSnap.exists()) setSettings({ ...DEFAULT_SETTINGS, ...docSnap.data() });
                    else setDoc(doc(db, 'settings', 'config'), DEFAULT_SETTINGS).catch(()=>{});
                }); return () => unsub();
            }, [user]);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'donations')); 
                const unsub = onSnapshot(q, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
                    setDonations(docs); setLoading(false);
                }); return () => unsub();
            }, [user]);

            const handleAddDonation = async (newDonation) => {
                if (!user) return;
                try { await addDoc(collection(db, 'donations'), newDonation); showNotification('บันทึกข้อมูลสำเร็จ'); } catch (e) { showNotification("บันทึกไม่สำเร็จ", 'error'); }
            };
            const handleUpdateDonation = async (updatedDonation) => {
                if (!user) return;
                try { const { id, ...data } = updatedDonation; await updateDoc(doc(db, 'donations', id), data); showNotification('อัปเดตข้อมูลสำเร็จ'); } catch (e) { showNotification("แก้ไขไม่สำเร็จ", 'error'); }
            };
            const handleDeleteDonation = async (id) => { if (!user) return; try { await deleteDoc(doc(db, 'donations', id)); showNotification('ลบข้อมูลรายการสำเร็จ'); } catch (e) {} };
            const handleUpdateSettings = async (newSettings) => { if (!user) return; try { await setDoc(doc(db, 'settings', 'config'), newSettings); showNotification('บันทึกตั้งค่าเรียบร้อย'); } catch (e) {} };
            const handleClearAllData = async () => { if (!user) return; try { const snapshot = await getDocs(query(collection(db, 'donations'))); const batch = writeBatch(db); snapshot.docs.forEach((doc) => { batch.delete(doc.ref); }); await batch.commit(); showNotification('ล้างข้อมูลสำเร็จ'); } catch (e) {} };

            // กรณีเปิดผ่านมือถือเพื่อสแกน QR อัปโหลด
            if (uploadSessionId && user) {
                return (
                    <><style>{`body { font-family: '${settings.fontFamily || 'Prompt'}', sans-serif !important; }`}</style><RemoteSlipUploader sessionId={uploadSessionId} db={db} themeColor={settings.themeColor} /></>
                );
            }

            return (
                <div className={`font-sans text-gray-800`}>
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=${settings.fontFamily || 'Prompt'}:wght@300;400;500;600;700&display=swap');
                        :root { --font-dynamic: '${settings.fontFamily || 'Prompt'}', sans-serif; }
                        body, button, input, select, textarea, h1, h2, h3, h4, h5, h6, p, span, a, div, .font-sans { font-family: var(--font-dynamic) !important; }
                    `}</style>

                    {notification && (<NotificationToast msg={notification.msg} type={notification.type} onClose={() => setNotification(null)} />)}
                    
                    {loading ? (
                        <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-gray-600"><Loader className="w-10 h-10 animate-spin mb-4" /><p>กำลังเชื่อมต่อฐานข้อมูล...</p></div>
                    ) : currentRoute === 'donate-system' ? (
                        <DonationSystem 
                            onBack={() => setCurrentRoute('home')} 
                            donations={donations} settings={settings} onAdd={handleAddDonation} onUpdate={handleUpdateDonation} onDelete={handleDeleteDonation}
                            onUpdateSettings={handleUpdateSettings} onClearData={handleClearAllData} showNotification={showNotification} loggedInUser={loggedInUser} setLoggedInUser={setLoggedInUser}
                        />
                    ) : (
                        <OfficialWebsite 
                            onNavigate={(route) => setCurrentRoute(route)} 
                            donations={donations} settings={settings} setLoggedInUser={setLoggedInUser} showNotification={showNotification} onUpdateSettings={handleUpdateSettings}
                        />
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
