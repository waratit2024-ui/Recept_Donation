        // ==========================================
        function RemoteSlipUpload({ db }) {
            const [status, setStatus] = useState('waiting'); // waiting, uploading, success, error
            const [preview, setPreview] = useState(null);
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('upload_ref');
        
            if (!sessionId) return <div className="p-8 text-center text-red-500 font-bold">❌ ลิงก์ไม่ถูกต้อง หรือหมดอายุแล้ว</div>;
        
            const handleMobileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setStatus('uploading');
                try {
                    // 1. ย่อรูป
                    const resizedImage = await resizeImage(file);
                    setPreview(resizedImage);
                    
                    // 2. ส่งรูปเข้า Firebase เพื่อให้หน้าจอเจ้าหน้าที่เด้งรับ
                    await updateDoc(doc(db, 'temp_uploads', sessionId), {
                        slipImage: resizedImage,
                        status: 'completed',
                        updatedAt: new Date().toISOString()
                    });
                    
                    setStatus('success');
                } catch (error) {
                    console.error(error);
                    setStatus('error');
                }
            };
        
            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-prompt">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center">
                        <div className="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <UploadCloud className="w-8 h-8 text-orange-600" />
                        </div>
                        <h2 className="text-xl font-bold text-gray-800 mb-2">อัปโหลดสลิปโอนเงิน</h2>
                        <p className="text-sm text-gray-500 mb-6">กรุณาแนบภาพสลิป เพื่อส่งให้เจ้าหน้าที่</p>
        
                        {status === 'waiting' && (
                            <label className="block w-full bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition cursor-pointer">
                                เลือกรูปสลิปจากมือถือ
                                <input type="file" accept="image/*" className="hidden" onChange={handleMobileUpload} />
                            </label>
                        )}
        
                        {status === 'uploading' && (
                            <div className="py-8 flex flex-col items-center">
                                <Loader className="w-10 h-10 text-orange-500 animate-spin mb-4" />
                                <p className="text-orange-600 font-bold animate-pulse">กำลังส่งรูปให้เจ้าหน้าที่...</p>
                            </div>
                        )}
        
                        {status === 'success' && (
                            <div className="py-4 animate-scale-up">
                                <CheckCircle className="w-16 h-16 text-green-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-green-600 mb-2">ส่งสลิปสำเร็จ!</h3>
                                <p className="text-sm text-gray-500 mb-4">ระบบบันทึกรูปภาพเรียบร้อยแล้ว<br/>คุณสามารถปิดหน้านี้ได้เลยครับ</p>
                                {preview && <img src={preview} alt="Slip" className="w-32 mx-auto rounded-lg border shadow-sm" />}
                            </div>
                        )}
        
                        {status === 'error' && (
                            <div className="py-4">
                                <AlertTriangle className="w-16 h-16 text-red-500 mx-auto mb-4" />
                                <h3 className="text-lg font-bold text-red-600 mb-2">เกิดข้อผิดพลาด</h3>
                                <p className="text-sm text-gray-500 mb-4">ไฟล์อาจใหญ่เกินไป หรือการเชื่อมต่อมีปัญหา</p>
                                <button onClick={() => setStatus('waiting')} className="bg-gray-200 px-6 py-2 rounded-lg font-bold">ลองใหม่อีกครั้ง</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // ส่วนท้ายเว็บไซต์ (Global Footer) แบบดั้งเดิมของคุณ
        // ==========================================
        function GlobalFooter({ settings }) {
            // กำหนด theme พื้นฐานเผื่อ settings ยังโหลดไม่เสร็จ
            const theme = settings?.themeColor || 'orange';
        
            return (
                <footer id="contact" className={`bg-gray-900 text-white pt-20 pb-10 mt-auto border-t-[8px] border-${theme}-500 w-full z-50 no-print`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
                            <div>
                                <div className="flex items-center gap-3 mb-6">
                                    <div className={`w-12 h-12 rounded-2xl bg-gradient-to-br from-${theme}-400 to-${theme}-600 flex items-center justify-center text-white shadow-lg`}>
                                        <BookOpen className="w-6 h-6" />
                                    </div>
                                    <span className="text-3xl font-bold text-white tracking-tight">{settings?.templeName || 'ชื่อวัด'}</span>
                                </div>
                                <p className="text-gray-400 mb-6 font-light">ร่วมสร้างบุญกุศล สะสมบารมี เป็นที่พึ่งทางใจของชาวพุทธ</p>
                                <div className="flex space-x-4">
                                    {settings?.contact?.facebook && <a href={settings.contact.facebook} target="_blank" rel="noreferrer" className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 hover:bg-blue-600 hover:text-white transition-all duration-300"><Facebook className="w-5 h-5" /></a>}
                                    {settings?.contact?.line && <a href={settings.contact.line} target="_blank" rel="noreferrer" className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 hover:bg-green-500 hover:text-white transition-all duration-300"><MessageCircle className="w-5 h-5" /></a>}
                                </div>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold mb-6 text-white tracking-wide">ข้อมูลติดต่อ</h3>
                                <ul className="space-y-5">
                                    <li className="flex items-start">
                                        <div className={`p-2 rounded-lg bg-gray-800 mr-4 text-${theme}-400`}><MapPin className="w-5 h-5" /></div>
                                        <span className="text-gray-400 leading-relaxed">{settings?.contact?.address || '-'}</span>
                                    </li>
                                    <li className="flex items-center">
                                        <div className={`p-2 rounded-lg bg-gray-800 mr-4 text-${theme}-400`}><Phone className="w-5 h-5" /></div>
                                        <span className="text-gray-400 font-mono text-lg">{settings?.contact?.phone || '-'}</span>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold mb-6 text-white tracking-wide">เวลาทำการ</h3>
                                <div className="bg-gray-800/50 border border-gray-700 rounded-2xl p-6">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-gray-300">เปิดให้เข้าชม/ทำบุญ</span>
                                    </div>
                                    <div className={`text-2xl font-bold text-${theme}-400 font-mono`}>06:00 - 18:00 น.</div>
                                    <p className="text-gray-500 text-sm mt-2">เปิดทำการทุกวัน ไม่มีวันหยุด</p>
                                </div>
                            </div>
                        </div>
                        <div className="text-center text-gray-600 text-sm border-t border-gray-800 pt-8 flex flex-col md:flex-row justify-between items-center">
                            <p>&copy; {new Date().getFullYear()} {settings?.templeName || 'ชื่อวัด'}. All rights reserved.</p>
                            <p className="mt-2 md:mt-0 opacity-80">
                                Powered by Donation Management System <span className={`text-${theme}-500 font-bold ml-1`}>v1.1.0</span>
                            </p>
                        </div>
                    </div>
                </footer>
            );
        }
                    
        // ==========================================
        // 7. APP & ROOT
        // ==========================================
        function App() {
            const [currentRoute, setCurrentRoute] = useState('home');
            const [donations, setDonations] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [notification, setNotification] = useState(null);
            const [loggedInUser, setLoggedInUser] = useState(null);

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth error:", error);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if(!u) setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const settingsRef = doc(db, 'settings', 'config'); 
                const unsubscribe = onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings({ ...DEFAULT_SETTINGS, ...docSnap.data() });
                    } else {
                        setDoc(settingsRef, DEFAULT_SETTINGS).catch(err => {
                            console.warn("Using default settings (Server sync skipped):", err.code);
                        });
                    }
                }, (error) => {
                    console.warn("Settings fetch warning:", error.code);
                });
                return () => unsubscribe();
            }, [user]);

            const sendEmailNotification = async (donation) => {
                const config = settings.emailNotify;
                if (!config?.enabled || !config?.serviceId || !config?.templateId || !config?.publicKey) return;

                const templateParams = {
                    temple_name: settings.templeName,
                    donor_name: donation.name,
                    amount: donation.amount.toLocaleString(),
                    purpose: donation.purpose,
                    method: donation.method,
                    date: new Date(donation.dateTime).toLocaleString('th-TH'),
                    admin_email: config.adminEmail
                };

                try {
                    await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            service_id: config.serviceId,
                            template_id: config.templateId,
                            user_id: config.publicKey,
                            template_params: templateParams
                        })
                    });
                    console.log('Email notification sent');
                } catch (error) {
                    console.error('Failed to send email notification:', error);
                }
            };
            
            const sendLineNotification = async (donation) => {
                const config = settings.lineNotify;
                if (!config?.enabled || !config?.webhookUrl || !config?.targetIds) return;

                let purposeText = donation.purpose;
                if (donation.roongTaanDate) {
                    purposeText += ` (วันที่ ${new Date(donation.roongTaanDate).toLocaleDateString('th-TH')} - ${donation.roongTaanNote})`;
                }

                const template = config.messageTemplate || DEFAULT_SETTINGS.lineNotify.messageTemplate;
                
                const message = template
                    .replace(/\{\{temple_name\}\}/g, settings.templeName || '')
                    .replace(/\{\{name\}\}/g, donation.name || '')
                    .replace(/\{\{purpose\}\}/g, purposeText || '')
                    .replace(/\{\{amount\}\}/g, (donation.amount || 0).toLocaleString())
                    .replace(/\{\{method\}\}/g, donation.method || '')
                    .replace(/\{\{note\}\}/g, donation.generalNote ? donation.generalNote : '-')
                    .replace(/\{\{date\}\}/g, new Date(donation.dateTime).toLocaleString('th-TH'));

                try {
                    const formData = new URLSearchParams();
                    formData.append('message', message);
                    formData.append('targetIds', config.targetIds);
                    
                    await fetch(config.webhookUrl, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors'
                    });
                    console.log('Line notification triggered via webhook');
                } catch (error) {
                    console.error('Failed to trigger Line notification:', error);
                }
            };

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'donations')); 
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
                    setDonations(docs);
                    setLoading(false);
                }, (error) => {
                    console.error("Donations fetch error:", error);
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, [user]);

            const handleAddDonation = async (newDonation) => {
                if (!user) return;
                try {
                    await addDoc(collection(db, 'donations'), newDonation);
                    showNotification('บันทึกข้อมูลสำเร็จ');
                    
                    sendEmailNotification(newDonation);
                    
                    if (newDonation.status === 'approved') {
                        sendLineNotification(newDonation);
                    }
                } catch (e) {
                    console.error(e);
                    showNotification("บันทึกไม่สำเร็จ (ตรวจสอบสิทธิ์การใช้งาน)", 'error');
                }
            };

            const handleUpdateDonation = async (updatedDonation) => {
                if (!user) return;
                try {
                    const { id, ...data } = updatedDonation;
                    
                    const oldDonation = donations.find(d => d.id === id);
                    const isJustApproved = oldDonation && oldDonation.status === 'pending' && updatedDonation.status === 'approved';

                    await updateDoc(doc(db, 'donations', id), data);
                    showNotification('อัปเดตข้อมูลสำเร็จ');
                    
                    if (isJustApproved) {
                        sendLineNotification(updatedDonation);
                    }
                } catch (e) {
                    showNotification("แก้ไขไม่สำเร็จ: " + e.message, 'error');
                }
            };

            const handleDeleteDonation = async (id) => {
                if (!user) return;
                try {
                    await deleteDoc(doc(db, 'donations', id));
                    showNotification('ลบข้อมูลรายการสำเร็จ');
                } catch (e) {
                    showNotification("ลบไม่สำเร็จ: " + e.message, 'error');
                }
            };

            const handleUpdateSettings = async (newSettings) => {
                if (!user) return;
                try {
                    // ทำความสะอาดข้อมูลทั่วไป (ล้างค่า undefined ที่ทำให้เกิด invalid nested entity)
                    const cleanSettings = JSON.parse(JSON.stringify(newSettings));
                    
                    // ส่งข้อมูลเข้าฐานข้อมูล
                    await setDoc(doc(db, 'settings', 'config'), cleanSettings);
                    showNotification('บันทึกการตั้งค่าระบบเรียบร้อยแล้ว!');
                } catch (e) {
                    console.error("Firebase Update Error:", e);
                    // ถ้าแอบอัปโหลดรูปใหญ่เกิน 1MB มา มันจะแจ้งเตือนให้รู้ตัวแทนการลบทิ้งครับ
                    if (e.message.includes('exceeds the maximum allowed size')) {
                        showNotification("บันทึกไม่สำเร็จ: รูปภาพมีขนาดใหญ่เกิน 1MB กรุณาใช้รูปที่ไฟล์เล็กกว่านี้", 'error');
                    } else {
                        showNotification("ตั้งค่าไม่สำเร็จ: " + e.message, 'error');
                    }
                }
            };

            const handleClearAllData = async () => {
                if (!user) return;
                try {
                    const q = query(collection(db, 'donations'));
                    const snapshot = await getDocs(q);
                    const batch = writeBatch(db);
                    snapshot.docs.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    showNotification('ล้างข้อมูลการบริจาคทั้งหมดเรียบร้อยแล้ว');
                } catch (e) {
                    showNotification("ล้างข้อมูลไม่สำเร็จ: " + e.message, 'error');
                }
            };

            // ==========================================
            // ส่วนที่ 2: ดักจับ URL ถ้าเป็นการแสกน QR Code ให้ออกไปหน้าอัปโหลดมือถือ
            // ==========================================
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('upload_ref')) {
                return (
                    <div className={`font-sans text-gray-800 flex flex-col min-h-screen`}>
                        <style>{`
                            @import url('https://fonts.googleapis.com/css2?family=${settings.fontFamily || 'Prompt'}:wght@300;400;500;600;700&display=swap');
                            :root { --font-dynamic: '${settings.fontFamily || 'Prompt'}', sans-serif; }
                            body, button, input, select, textarea, h1, h2, h3, h4, h5, h6, p, span, a, div, .font-sans { font-family: var(--font-dynamic) !important; }
                        `}</style>
                        {/* เรียกแสดงหน้าอัปโหลดสลิปสำหรับมือถือ */}
                        <div className="flex-grow">
                            <RemoteSlipUpload db={db} />
                        </div>
                    </div>
                );
            }
            // ==========================================

            return (
                <div className={`font-sans text-gray-800 flex flex-col min-h-screen`}>
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=${settings.fontFamily || 'Prompt'}:wght@300;400;500;600;700&display=swap');
                        html { font-size: 80% !important; }
                        @media print { html { font-size: 100% !important; } }
                        :root { --font-dynamic: '${settings.fontFamily || 'Prompt'}', sans-serif; }
                        body, button, input, select, textarea, h1, h2, h3, h4, h5, h6, p, span, a, div, .font-sans { font-family: var(--font-dynamic) !important; }
                    `}</style>

                    {notification && (<NotificationToast msg={notification.msg} type={notification.type} onClose={() => setNotification(null)} />)}
                    
                    <div className="flex-grow">
                        {loading ? (
                            <div className="min-h-[80vh] flex flex-col items-center justify-center bg-gray-50 text-gray-600">
                                <Loader className="w-10 h-10 animate-spin mb-4" />
                                <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                            </div>
                        ) : currentRoute === 'donate-system' ? (
                            <DonationSystem 
                                onBack={() => setCurrentRoute('home')} 
                                donations={donations}
                                settings={settings}
                                onAdd={handleAddDonation}
                                onUpdate={handleUpdateDonation}
                                onDelete={handleDeleteDonation}
                                onUpdateSettings={handleUpdateSettings}
                                onClearData={handleClearAllData}
                                showNotification={showNotification}
                                loggedInUser={loggedInUser}
                                setLoggedInUser={setLoggedInUser}
                            />
                        ) : (
                            <OfficialWebsite 
                                onNavigate={(route) => setCurrentRoute(route)} 
                                donations={donations} 
                                settings={settings}
                                setLoggedInUser={setLoggedInUser}
                                showNotification={showNotification}
                                onUpdateSettings={handleUpdateSettings}
                            />
                        )}
                    </div>

                    {/* เรียกใช้ Footer ไว้ล่างสุดนอกเงื่อนไข (จะโชว์ทุกหน้า!) */}
                    {!loading && <GlobalFooter settings={settings} />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
