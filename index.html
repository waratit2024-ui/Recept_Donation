        const convertToThaiBahtText = (amount) => {
            if (amount === 0 || isNaN(amount)) return "ศูนย์บาทถ้วน";
            const numberString = Math.floor(amount).toString();
            const numbers = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
            const positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
            let text = '';
            let length = numberString.length;
            for (let i = 0; i < length; i++) {
                const num = parseInt(numberString.charAt(i));
                const pos = length - i - 1;
                if (num !== 0) {
                    if (pos === 1 && num === 1) { text += 'สิบ'; }
                    else if (pos === 1 && num === 2) { text += 'ยี่สิบ'; }
                    else if (pos === 0 && num === 1 && length > 1 && parseInt(numberString.charAt(i-1)) !== 0) { text += 'เอ็ด'; }
                    else { text += numbers[num] + positions[pos]; }
                } else if (pos === 6) { 
                    text += positions[pos];
                }
            }
            return text + "บาทถ้วน";
        };

        const resizeImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let targetWidth = img.width;
                        let targetHeight = img.height;
                        if (targetWidth > MAX_WIDTH) {
                            targetHeight = targetHeight * (MAX_WIDTH / targetWidth);
                            targetWidth = MAX_WIDTH;
                        }
                        canvas.width = targetWidth;
                        canvas.height = targetHeight;
                        const ctx = canvas.getContext('2d');
                        if (file.type === 'image/png') {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/png'));
                        } else {
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        }
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        };

        // ----- Login & Reset Password Modal -----
        function LoginScreen({ onClose, onLoginSuccess, onUpdateSettings, showNotification, settings }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isResetMode, setIsResetMode] = useState(false);
            const [resetUsername, setResetUsername] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const theme = settings?.themeColor || 'orange';

            const handleLoginSubmit = (e) => { 
                e.preventDefault(); 
                setIsLoading(true);
                setError('');
                setTimeout(() => {
                    const inputUser = username.trim().toLowerCase();
                    const users = settings.users || [];
                    const foundUser = users.find(u => u.username.toLowerCase() === inputUser && u.password === password);
                    if (foundUser) {
                        onLoginSuccess(foundUser); 
                    } else { 
                        setError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง โปรดลองอีกครั้ง'); 
                        setIsLoading(false);
                    }
                }, 800);
            };

            const handleResetSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (newPass !== confirmPass) return setError('รหัสผ่านใหม่ไม่ตรงกัน กรุณาพิมพ์ให้เหมือนกันทั้ง 2 ช่อง');
                if (newPass.length < 4) return setError('รหัสผ่านใหม่ต้องมีความยาวอย่างน้อย 4 ตัวอักษร');

                setIsLoading(true);
                setTimeout(() => {
                    const users = settings.users || [];
                    const userIndex = users.findIndex(u => u.username.toLowerCase() === resetUsername.trim().toLowerCase() && u.role === 'admin');
                    if (userIndex === -1) {
                        setError('ไม่พบชื่อผู้ใช้งานระดับ Admin นี้ในระบบ');
                        setIsLoading(false);
                        return;
                    }
                    const newUsers = [...users];
                    newUsers[userIndex].password = newPass;
                    
                    if(onUpdateSettings) {
                        onUpdateSettings({...settings, users: newUsers});
                        showNotification('เปลี่ยนรหัสผ่านผู้ดูแลระบบสำเร็จ! กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่');
                        setIsResetMode(false);
                        setUsername(resetUsername);
                        setPassword('');
                        setNewPass('');
                        setConfirmPass('');
                    }
                    setIsLoading(false);
                }, 1000);
            };

            return (
                <div className="fixed inset-0 z-[200] flex min-h-screen bg-white">
                    <div className="hidden lg:flex lg:w-1/2 relative bg-gray-900 items-center justify-center overflow-hidden">
                        <img src={settings.bannerUrl} alt="Background" className="absolute inset-0 w-full h-full object-cover opacity-40 scale-105" />
                        <div className="absolute inset-0 bg-gradient-to-br from-black/80 via-black/40 to-transparent"></div>
                        <div className="relative z-10 px-16 text-white max-w-2xl animate-fade-in">
                            <div className="w-20 h-20 bg-white/10 backdrop-blur-sm rounded-2xl flex items-center justify-center mb-8 border border-white/20"><ShieldCheck className="w-10 h-10 text-white" /></div>
                            <h2 className="text-4xl font-bold mb-4 leading-tight">{settings.templeName}</h2>
                            <p className="text-lg text-gray-300 font-light mb-8">ระบบจัดการข้อมูลการบริจาคและออกใบอนุโมทนาบัตรอิเล็กทรอนิกส์ สงวนสิทธิ์การเข้าใช้งานเฉพาะเจ้าหน้าที่ที่ได้รับมอบหมายเท่านั้น</p>
                            <div className="flex items-center gap-4 text-sm text-gray-400"><Lock className="w-4 h-4" /> ระบบรักษาความปลอดภัยข้อมูล</div>
                        </div>
                    </div>
                    <div className="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 relative bg-gray-50/50">
                        <button onClick={onClose} className="absolute top-6 right-6 sm:top-8 sm:right-8 text-gray-400 hover:text-gray-600 transition flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 hover:shadow"><X className="w-4 h-4" /> <span className="text-sm font-medium">ปิดหน้าต่าง</span></button>
                        <div className="w-full max-w-md animate-scale-up">
                            {!isResetMode ? (
                                <>
                                    <div className="text-center mb-8"><div className={`w-20 h-20 bg-${theme}-100 text-${theme}-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ring-4 ring-white`}><User className="w-10 h-10" /></div><h1 className="text-3xl font-bold text-gray-900 mb-2">เข้าสู่ระบบ</h1><p className="text-gray-500">กรุณากรอกชื่อผู้ใช้งานและรหัสผ่าน</p></div>
                                    <form onSubmit={handleLoginSubmit} className="space-y-5 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">ชื่อผู้ใช้งาน (Username)</label>
                                            <div className="relative group">
                                                <div className={`absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors ${username ? `text-${theme}-500` : 'text-gray-400'}`}><User className="h-5 w-5" /></div>
                                                <input type="text" className={`w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-${theme}-500 focus:bg-white focus:border-transparent transition-all text-lg`} value={username} onChange={(e) => setUsername(e.target.value)} placeholder="admin หรือ staff" autoFocus />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">รหัสผ่าน (Password)</label>
                                            <div className="relative group">
                                                <div className={`absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors ${password ? `text-${theme}-500` : 'text-gray-400'}`}><Key className="h-5 w-5" /></div>
                                                <input type="password" className={`w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-${theme}-500 focus:bg-white focus:border-transparent transition-all text-lg tracking-widest`} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" />
                                            </div>
                                            {error && (<div className="bg-red-50 text-red-600 text-sm mt-4 p-3 rounded-lg flex items-center animate-fade-in border border-red-100"><AlertTriangle className="w-5 h-5 mr-2 flex-shrink-0"/> {error}</div>)}
                                        </div>
                                        <button type="submit" disabled={isLoading || !password || !username} className={`w-full bg-${theme}-600 hover:bg-${theme}-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-4 px-4 rounded-xl transition-all flex justify-center items-center shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 mt-2`}>
                                            {isLoading ? <><Loader className="w-5 h-5 animate-spin mr-2" /> กำลังตรวจสอบข้อมูล...</> : <><LogIn className="w-5 h-5 mr-2" /> ยืนยันการเข้าสู่ระบบ</>}
                                        </button>
                                        <button type="button" onClick={() => { setIsResetMode(true); setError(''); }} className={`w-full text-center text-sm font-medium text-${theme}-600 hover:text-${theme}-800 pt-2 transition-colors`}>ลืมรหัสผ่าน? (สำหรับผู้ดูแลระบบ)</button>
                                    </form>
                                </>
                            ) : (
                                <>
                                    <div className="text-center mb-8"><div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ring-4 ring-white"><ShieldCheck className="w-10 h-10" /></div><h1 className="text-2xl font-bold text-gray-900 mb-2">รีเซ็ตรหัสผ่าน (Admin)</h1><p className="text-gray-500 text-sm">กรุณากรอก Username ของผู้ดูแลระบบ<br/>เพื่อตั้งรหัสผ่านใหม่ทันที</p></div>
                                    <form onSubmit={handleResetSubmit} className="space-y-4 bg-white p-8 rounded-3xl shadow-xl border border-red-100">
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">ชื่อผู้ใช้งาน Admin (Username)</label><input type="text" required className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500" value={resetUsername} onChange={(e) => setResetUsername(e.target.value)} placeholder="เช่น admin" autoFocus /></div>
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">ตั้งรหัสผ่านใหม่</label><input type="password" required className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 tracking-widest" value={newPass} onChange={(e) => setNewPass(e.target.value)} placeholder="••••••••" /></div>
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่อีกครั้ง</label><input type="password" required className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 tracking-widest" value={confirmPass} onChange={(e) => setConfirmPass(e.target.value)} placeholder="••••••••" /></div>
                                        {error && (<div className="bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-center animate-fade-in border border-red-100"><AlertTriangle className="w-5 h-5 mr-2 flex-shrink-0"/> {error}</div>)}
                                        <button type="submit" disabled={isLoading || !newPass || !confirmPass || !resetUsername} className="w-full bg-red-600 hover:bg-red-700 disabled:bg-gray-300 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg mt-4">
                                            {isLoading ? <><Loader className="w-5 h-5 animate-spin inline mr-2" /> กำลังบันทึก...</> : 'บันทึกรหัสผ่านใหม่'}
                                        </button>
                                        <button type="button" onClick={() => { setIsResetMode(false); setError(''); }} className="w-full text-center text-sm font-medium text-gray-500 hover:text-gray-800 pt-2 transition-colors">ยกเลิก / กลับไปเข้าสู่ระบบ</button>
                                    </form>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function UserSettingsPanel({ loggedInUser, setLoggedInUser, settings, onSave, showNotification }) {
            const [currentPassword, setCurrentPassword] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (currentPassword !== loggedInUser.password) return showNotification('รหัสผ่านปัจจุบันไม่ถูกต้อง', 'error');
                if (newPassword !== confirmPassword) return showNotification('รหัสผ่านใหม่ไม่ตรงกัน', 'error');
                if (newPassword.length < 4) return showNotification('รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัวอักษร', 'error');

                const users = settings.users || [];
                const userIndex = users.findIndex(u => u.id === loggedInUser.id);
                if (userIndex !== -1) {
                    const newUsers = [...users];
                    newUsers[userIndex].password = newPassword;
                    onSave({...settings, users: newUsers});
                    setLoggedInUser(newUsers[userIndex]);
                    showNotification('เปลี่ยนรหัสผ่านส่วนตัวสำเร็จ');
                    setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-bold flex items-center text-gray-800"><UserCog className="w-7 h-7 mr-2 text-blue-600" /> บัญชีของฉัน (My Account)</h2>
                    <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-200">

            useEffect(() => {

                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.forEach(doc => { if (doc.imageUrl && (!doc.images || doc.images.length === 0)) doc.images = [doc.imageUrl]; });
                    docs.sort((a, b) => new Date(b.date) - new Date(a.date));

                });
                return () => unsubscribe();
            }, []);

            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    setIsUploading(true);
                    try {
                        const newImages = await Promise.all(files.map(file => resizeImage(file)));
                        setFormData(prev => ({ ...prev, images: [...(prev.images || []), ...newImages] }));
                    } catch (err) { showNotification("อัปโหลดรูปไม่สำเร็จ", "error"); }

                e.preventDefault();
                if (!formData.title || !formData.date) return showNotification("กรุณาระบุหัวข้อและวันที่", "error");

                    const dataToSave = { ...formData, imageUrl: formData.images?.[0] || '' };

                    else { await addDoc(collection(db, 'news'), { ...dataToSave, createdAt: new Date().toISOString() }); showNotification("เพิ่มข่าวสารสำเร็จ"); }

                setIsGenerating(true);
                try {
                    const prompt = `เขียนเนื้อหาข่าวประชาสัมพันธ์สำหรับวัด ชื่อหัวข้อข่าว: "${formData.title}"\nให้เขียนเนื้อหาข่าวความยาวประมาณ 2-3 ย่อหน้า ภาษาไทย สุภาพ เป็นทางการ เหมาะสำหรับการประกาศของวัด เชิญชวนญาติโยมมาร่วมบุญหรือร่วมกิจกรรม (ไม่ต้องมีหัวข้อซ้ำ)`;

                                    <div>
                                        <label className="block text-sm font-medium mb-1">รูปภาพประกอบ (เลือกได้หลายรูป)</label>

                                                <input type="file" className="hidden" accept="image/*" multiple onChange={handleImageUpload} disabled={isUploading} />
                                            </label>
                                            <span className="text-xs text-gray-500">{formData.images?.length || 0} รูป</span>

                                </div>

        function DonationForm({ loggedInUser, userRole, onSave, showNotification, settings }) {
            const [name, setName] = useState('');
            const [method, setMethod] = useState((userRole === 'staff' || userRole === 'admin') ? 'เงินสด' : 'เงินโอน');
            const [customMethod, setCustomMethod] = useState(''); 
            const [generalNote, setGeneralNote] = useState('');
            const [slipImage, setSlipImage] = useState(null); 
            const [isUploading, setIsUploading] = useState(false);
            const [isGeneratingBlessing, setIsGeneratingBlessing] = useState(false);
            const [showThankYou, setShowThankYou] = useState(false);
            const [selectedItems, setSelectedItems] = useState({});
            const [showETaxModal, setShowETaxModal] = useState(false);
            const [uploadSession, setUploadSession] = useState(null); 

            // ⏰ State สำหรับนาฬิกาเรียลไทม์
            const [currentTime, setCurrentTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            const theme = settings.themeColor || 'orange';
            const donationTypes = settings.donationTypes || [];

            useEffect(() => {
                const initial = {};
                donationTypes.forEach(type => {
                    if (type.active) {
                        initial[type.id] = { checked: false, quantity: 1, amount: type.price || '' };
                    }
                });
                const roongTaan = donationTypes.find(t => t.id === 'roong_taan');
                if (roongTaan && roongTaan.active) {
                    initial['roong_taan'] = { checked: false, date: '', note: '' };
                }
                setSelectedItems(prev => ({...initial, ...prev}));
            }, [donationTypes]);

            useEffect(() => {
                if (userRole === 'staff' || userRole === 'admin') {
                    setMethod('เงินสด');
                } else {
                    setMethod('เงินโอน');
                }
            }, [userRole]);

            const totalAmount = useMemo(() => {
                let sum = 0;
                donationTypes.forEach(type => {
                    if (selectedItems[type.id]?.checked && !type.isSpecial) {
                        if (type.hasQuantity) {
                            sum += (selectedItems[type.id].quantity || 1) * type.price;
                        } else {
                            sum += Number(selectedItems[type.id].amount || 0);
                        }
                    }
                });
                return sum;
            }, [selectedItems, donationTypes]);

            const handleGenerateSlipQR = async () => {
                const sessionId = `req_${Date.now()}`;
                try {
                    await setDoc(doc(db, 'temp_uploads', sessionId), {
                        status: 'waiting',
                        createdAt: new Date().toISOString(),
                        slipImage: null
                    });

                    const uploadUrl = `${window.location.origin}${window.location.pathname}?upload_ref=${sessionId}`;
                    setUploadSession({ id: sessionId, url: uploadUrl });

                    const unsubscribe = onSnapshot(doc(db, 'temp_uploads', sessionId), (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.status === 'completed' && data.slipImage) {
                                setSlipImage(data.slipImage); 
                                setUploadSession(null);       
                                showNotification('รับรูปสลิปจากผู้บริจาคเรียบร้อยแล้ว!', 'success');
                                unsubscribe();                
                                deleteDoc(doc(db, 'temp_uploads', sessionId)); 
                            }
                        }
                    });
                } catch (error) {
                    showNotification('สร้าง QR Code ไม่สำเร็จ', 'error');
                }
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploading(true);
                    try { 
                        const resized = await resizeImage(file); 
                        setSlipImage(resized); 
                    } catch (err) { 
                        showNotification("ไม่สามารถอ่านไฟล์ภาพได้", 'error'); 
                    }
                    setIsUploading(false);
                }
            };
            
            const handleGenerateBlessing = async () => {
                if (!name) return showNotification("กรุณาระบุชื่อผู้บริจาคก่อน", "error");
                setIsGeneratingBlessing(true);
                try {
                    const activePurposes = donationTypes.filter(t => selectedItems[t.id]?.checked).map(t => t.name).join(', ') || 'บำรุงวัด';
                    const prompt = `เขียนคำอวยพรสั้นๆ 1-2 ประโยค (ไม่เกิน 150 ตัวอักษร) สำหรับผู้ที่มาทำบุญที่วัด\nชื่อผู้บริจาค: ${name}\nรายการที่ทำบุญ: ${activePurposes}\nจำนวนเงิน: ${totalAmount} บาท\nขอภาษาไทยที่ไพเราะ เป็นสิริมงคล (ไม่ต้องมีคำขึ้นต้นเช่น "คำอวยพร:")`;
                    const result = await callGemini(prompt);
                    setGeneralNote(result.trim().replace(/^["']|["']$/g, ''));
                    showNotification("สร้างคำอวยพรด้วย AI สำเร็จ ✨");
                } catch(e) {
                    showNotification("สร้างคำอวยพรไม่สำเร็จ", "error");
                } finally {
                    setIsGeneratingBlessing(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (settings.systemStatus === 'closed') return showNotification('ขณะนี้ปิดรับบริจาคชั่วคราว', 'error');
                if (!name) return showNotification('กรุณาระบุชื่อ-สกุล', 'error');
                
                const isRoongTaanChecked = selectedItems['roong_taan']?.checked;
                if (totalAmount <= 0 && !isRoongTaanChecked) return showNotification('กรุณาระบุยอดเงินบริจาค', 'error');
                if (isRoongTaanChecked && (!selectedItems['roong_taan'].date || !selectedItems['roong_taan'].note)) return showNotification('กรุณาระบุวันที่และสิ่งของสำหรับโรงทาน', 'error');
                
                const finalMethod = method === 'อื่นๆ' ? customMethod : method;
                if (method === 'อื่นๆ' && !customMethod.trim()) return showNotification('กรุณาระบุช่องทางการรับเงินให้ชัดเจน', 'error');
                
                if (settings.requireSlip !== false && method === 'เงินโอน' && !slipImage && userRole === 'donor') return showNotification('กรุณาแนบสลิปการโอนเงิน', 'error');

                let purposeParts = [];
                donationTypes.forEach(type => {
                    const item = selectedItems[type.id];
                    if (item?.checked) {
                        if (type.isSpecial && type.id === 'roong_taan') {
                            purposeParts.push(`จองโรงทาน`);
                        } else if (type.hasQuantity) {
                            purposeParts.push(`${type.name} ${item.quantity} ${type.unit} (${(item.quantity * type.price).toLocaleString()} บาท)`);
                        } else {
                            purposeParts.push(`${type.name} ${Number(item.amount).toLocaleString()} บาท`);
                        }
                    }
                });

                const newDonation = { 
                    dateTime: new Date().toISOString(), 
                    name, 
                    purpose: purposeParts.join(', '), 
                    amount: totalAmount, 
                    method: finalMethod, 
                    generalNote, 
                    status: userRole === 'donor' ? 'pending' : 'approved', 
                    source: userRole === 'donor' ? 'self' : 'staff', 
                    recordedBy: loggedInUser ? loggedInUser.name : 'ผู้บริจาค (ออนไลน์)',
                    announced: false, 
                    roongTaanDate: isRoongTaanChecked ? selectedItems['roong_taan'].date : null, 
                    roongTaanNote: isRoongTaanChecked ? selectedItems['roong_taan'].note : null, 
                    slipImage: slipImage 
                };
                onSave(newDonation);
                if (userRole === 'donor') setShowThankYou(true); else resetForm();
            };

            const resetForm = () => {
                setName(''); 
                setMethod((userRole === 'staff' || userRole === 'admin') ? 'เงินสด' : 'เงินโอน'); 
                setCustomMethod(''); 
                setGeneralNote(''); 
                setSlipImage(null);
                const resetItems = {};
                Object.keys(selectedItems).forEach(key => {
                    resetItems[key] = { ...selectedItems[key], checked: false, amount: '', quantity: 1, date: '', note: '' };
                });
                setSelectedItems(resetItems);
                setShowThankYou(false);
            }

            if (showThankYou) {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8 text-center animate-scale-up">
                        <div className={`w-20 h-20 bg-${theme}-100 rounded-full flex items-center justify-center mx-auto mb-6`}><HeartHandshake className={`w-10 h-10 text-${theme}-600`} /></div>
                        <h2 className={`text-2xl font-bold text-${theme}-700 mb-4`}>อนุโมทนาบุญ</h2>
                        <p className="text-gray-600 text-lg leading-relaxed mb-8">{settings.messages?.thankYou || 'ขอขอบคุณที่ร่วมทำบุญ'}</p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onClick={resetForm} className={`bg-${theme}-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-${theme}-700 transition`}>
                                กลับสู่หน้าหลัก
                            </button>
                        </div>
                        {showETaxModal && <ETaxModal onClose={() => setShowETaxModal(false)} />}
                    </div>
                );
            }

            if (settings.systemStatus === 'closed' && userRole === 'donor') {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8 text-center text-red-600">
                        <AlertTriangle className="w-16 h-16 mx-auto mb-4" />
                        <h2 className="text-2xl font-bold">ขณะนี้ปิดรับบริจาคชั่วคราว</h2>
                    </div>
                );
            }

            return (
                // เปลี่ยนเป็น max-w-7xl เพื่อให้กล่องกว้างขึ้น รองรับ 3 คอลัมน์ได้สวยงาม
                <div className="max-w-7xl mx-auto bg-white rounded-xl shadow-md overflow-hidden no-print relative">
                    
                    {/* --- Modal แสดง QR Code ให้ผู้บริจาคสแกน --- */}
                    {uploadSession && (
                        <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl border border-gray-100 text-center max-w-sm w-full animate-scale-up">
                                <Smartphone className="w-12 h-12 text-blue-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-gray-800 mb-2">ให้ผู้บริจาคสแกน QR นี้</h3>
                                <p className="text-sm text-gray-500 mb-6">สแกนด้วยกล้องมือถือ เพื่อส่งรูปสลิป<br/>มาที่เครื่องนี้โดยอัตโนมัติ</p>
                                
                                <div className="bg-white p-4 rounded-xl shadow-sm border-2 border-dashed border-gray-300 inline-block mb-6 relative">
                                    <img 
                                        src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(uploadSession.url)}`} 
                                        alt="Upload QR" 
                                        className="w-48 h-48 mx-auto"
                                    />
                                    <div className="absolute inset-0 bg-white/20 flex items-center justify-center pointer-events-none">
                                        <div className="w-full h-1 bg-blue-500/50 absolute top-0 animate-pulse"></div>
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-center text-blue-600 font-bold animate-pulse mb-6">
                                    <Loader className="w-5 h-5 mr-2 animate-spin" /> กำลังรอรับรูปสลิป...
                                </div>

                                <button type="button" onClick={() => setUploadSession(null)} className="text-gray-500 hover:text-gray-800 font-medium underline">
                                    ยกเลิก
                                </button>
                            </div>
                        </div>
                    )}

                    <div className={`bg-${theme}-100 px-6 py-4 border-b border-${theme}-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2`}>
                        <h2 className={`text-xl font-semibold text-${theme}-800 flex items-center`}><PlusCircle className="w-6 h-6 mr-2 shrink-0" /> {userRole === 'donor' ? 'ฟอร์มแจ้งความประสงค์บริจาค' : 'บันทึกรับเงินบริจาค'}</h2>
                        <span className="text-xs sm:text-sm text-gray-500 bg-white px-3 py-1 rounded-full border">{userRole === 'donor' ? 'รอตรวจสอบ' : 'อนุมัติอัตโนมัติ'}</span>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="p-6">
                        
                        {/* ข้อมูล Header ฟอร์ม */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-gray-600 bg-gray-50/80 p-4 rounded-xl border border-gray-200 mb-6 items-center shadow-sm">
                            <div className="flex items-center">
                                <span className="font-bold text-gray-700 mr-2 bg-white px-2 py-1 rounded shadow-sm border">ID:</span> อัตโนมัติ
                            </div>
                            <div className="flex items-center">
                                <span className="font-bold text-gray-700 mr-2 bg-white px-2 py-1 rounded shadow-sm border">ผู้บันทึก:</span> {loggedInUser ? loggedInUser.name : 'ผู้บริจาค (ออนไลน์)'}
                            </div>
                            <div className="flex items-center md:justify-end text-orange-700 font-bold bg-orange-100 px-4 py-2 rounded-lg w-fit md:ml-auto border border-orange-200">
                                <Clock className="w-4 h-4 mr-2" />
                                {currentTime.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })} 
                                <span className="mx-2 text-orange-300">|</span> 
                                {currentTime.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} น.
                            </div>
                        </div>

                        {/* ========================================================= */}
                        {/* --- โครงสร้าง 3 คอลัมน์ (Desktop: 3, Tablet: 2, Mobile: 1) --- */}
                        {/* ========================================================= */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
                            
                            {/* --- คอลัมน์ 1: ข้อมูลผู้บริจาค และ หมายเหตุ --- */}
                            <div className="space-y-6">
                                <label className="block text-sm font-bold text-gray-700 bg-gray-100 p-2 rounded">1. ข้อมูลผู้บริจาค</label>
                                
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1 uppercase font-bold tracking-wider">ชื่อ - สกุล ผู้บริจาค <span className="text-red-500">*</span></label>
                                    <textarea 
                                        required 
                                        rows="2"
                                        className={`w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-${theme}-500 outline-none text-lg`} 
                                        value={name} 
                                        onChange={e => setName(e.target.value)} 
                                        placeholder="เช่น ครอบครัวใจดี, นาย ก และ นาง ข (สามารถพิมพ์หลายชื่อได้)" 
                                    ></textarea>
                                </div>

                                {/* ย้ายหมายเหตุมาไว้คอลัมน์นี้ เพื่อให้ความสูงบาลานซ์กับคอลัมน์อื่น */}
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="block text-sm font-medium text-gray-700">หมายเหตุเพิ่มเติม / คำอวยพร</label>
                                        <button type="button" onClick={handleGenerateBlessing} disabled={isGeneratingBlessing || !name} className={`text-xs bg-${theme}-50 text-${theme}-600 hover:bg-${theme}-100 px-2 py-1.5 rounded flex items-center transition disabled:opacity-50 font-medium border border-${theme}-200 shadow-sm`}>
                                            {isGeneratingBlessing ? <Loader className="w-3 h-3 animate-spin mr-1"/> : <Sparkles className="w-3 h-3 mr-1"/>}
                                            ร่างด้วย AI ✨
                                        </button>
                                    </div>
                                    <textarea 
                                        rows="4" 
                                        className={`w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-${theme}-500 text-sm`} 
                                        value={generalNote} 
                                        onChange={e => setGeneralNote(e.target.value)} 
                                        placeholder="ข้อความเพิ่มเติม..."
                                    ></textarea>
                                </div>
                            </div>

                            {/* --- คอลัมน์ 2: ประเภทการบริจาค --- */}
                            <div className="space-y-4">
                                <label className="block text-sm font-bold text-gray-700 bg-gray-100 p-2 rounded">2. เลือกประเภทการบริจาค</label>
                                <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {donationTypes.filter(t => t.active).map(type => {
                                        const itemState = selectedItems[type.id] || { checked: false, quantity: 1, amount: '' };
                                        const isChecked = itemState.checked;
                                        if (type.isSpecial && type.id === 'roong_taan') {
                                            return (
                                                <div key={type.id} className={`p-3 rounded-lg border transition-colors ${isChecked ? `bg-${theme}-50 border-${theme}-300` : 'border-gray-200 hover:bg-gray-50'}`}>
                                                    <div className="flex items-center mb-2"><input type="checkbox" className={`w-5 h-5 text-${theme}-600 rounded border-gray-300 focus:ring-${theme}-500`} checked={isChecked} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, checked: e.target.checked}})} /><span className="ml-2 font-medium">{type.name}</span></div>
                                                    {isChecked && (<div className="ml-7 space-y-2"><input type="date" className="w-full p-2 border border-gray-300 rounded outline-none text-sm" value={itemState.date || ''} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, date: e.target.value}})} required /><input type="text" placeholder="ระบุสิ่งของ" className="w-full p-2 border border-gray-300 rounded outline-none text-sm" value={itemState.note || ''} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, note: e.target.value}})} required /></div>)}
                                                </div>
                                            );
                                        }
                                        return (
                                            <div key={type.id} className={`p-3 rounded-lg border transition-colors ${isChecked ? `bg-${theme}-50 border-${theme}-300` : 'border-gray-200 hover:bg-gray-50'}`}>
                                                <div className="flex items-center mb-2 justify-between">
                                                    <div className="flex items-center"><input type="checkbox" className={`w-5 h-5 text-${theme}-600 rounded border-gray-300 focus:ring-${theme}-500`} checked={isChecked} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, checked: e.target.checked}})} /><span className="ml-2 font-medium">{type.name} {type.hasQuantity && `(${type.price}.-)`}</span></div>
                                                    {isChecked && type.hasQuantity && <span className={`text-${theme}-600 font-bold`}>{itemState.quantity * type.price} บ.</span>}
                                                </div>
                                                {isChecked && (<div className="ml-7 flex items-center gap-2">{type.hasQuantity ? (<><button type="button" className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300" onClick={() => setSelectedItems(prev => ({...prev, [type.id]: {...itemState, quantity: Math.max(1, (itemState.quantity || 1) - 1)}}))}>-</button><input type="number" min="1" className="w-16 text-center border-none bg-transparent font-bold" value={itemState.quantity || 1} readOnly /><button type="button" className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300" onClick={() => setSelectedItems(prev => ({...prev, [type.id]: {...itemState, quantity: (itemState.quantity || 1) + 1}}))}>+</button><span className="text-gray-500">{type.unit}</span></>) : (<><input type="number" min="1" placeholder="ระบุจำนวนเงิน" className="w-full p-2 border border-gray-300 rounded outline-none" value={itemState.amount} onChange={e => setSelectedItems({...selectedItems, [type.id]: {...itemState, amount: e.target.value}})} /><span className="text-gray-500">บาท</span></>)}</div>)}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* --- คอลัมน์ 3: การชำระเงิน (ขยายเต็มแถวถ้าเป็นจอแท็บเล็ต) --- */}
                            <div className="space-y-5 md:col-span-2 lg:col-span-1">
                                <label className="block text-sm font-bold text-gray-700 bg-gray-100 p-2 rounded">3. สรุปยอด และ ชำระเงิน</label>

                                <div className={`bg-${theme}-50 p-4 rounded-xl flex justify-between items-center border border-${theme}-200 shadow-inner`}>
                                    <span className="text-gray-700 font-bold">ยอดรวมทั้งสิ้น</span>
                                    <span className={`text-3xl font-black text-${theme}-600`}>{totalAmount.toLocaleString()} บาท</span>
                                </div>

                                {/* กล่องเลือกช่องทางชำระเงิน */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">ช่องทางการรับเงิน</label>
                                    <select className="w-full p-3 border border-gray-300 rounded-lg outline-none bg-white font-medium" value={method} onChange={e => setMethod(e.target.value)}>
                                        <option value="เงินสด">💵 รับเงินสด ณ จุดบริการ</option>
                                        <option value="เงินโอน">🏦 โอนเงินเข้าบัญชีวัด (ต้องมีสลิป)</option>
                                        <option value="อื่นๆ">❓ อื่นๆ (พิมพ์ระบุเอง)</option>
                                    </select>
                                    
                                    {method === 'อื่นๆ' && (
                                        <div className="mt-3 animate-fade-in">
                                            <input 
                                                type="text" 
                                                className={`w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-${theme}-500 bg-blue-50 text-blue-900 placeholder-blue-300`}
                                                value={customMethod}
                                                onChange={e => setCustomMethod(e.target.value)}
                                                placeholder="ระบุชื่อช่องทาง เช่น เช็คธนาคาร, พร้อมเพย์"
                                                required
                                            />
                                        </div>
                                    )}
                                </div>

                                {/* ส่วนของหลักฐานการโอน */}
                                <div className="bg-gray-50 rounded-lg border border-gray-200 p-4">
                                    {method === 'เงินโอน' ? (
                                        <div className="space-y-4">
                                            
                                            {/* ปุ่มสร้าง QR ให้ผู้บริจาคแสกน (เห็นเฉพาะเจ้าหน้าที่) */}
                                            {(userRole === 'staff' || userRole === 'admin') && !slipImage && (
                                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 text-center animate-fade-in">
                                                    <QrCode className="w-10 h-10 text-blue-500 mx-auto mb-2" />
                                                    <p className="text-sm font-bold text-blue-800 mb-1">รับสลิปผ่านมือถือผู้บริจาค</p>
                                                    <p className="text-xs text-blue-600 mb-3">ให้ผู้บริจาคสแกนเพื่อส่งรูปเข้าจอคอมอัตโนมัติ</p>
                                                    <button type="button" onClick={handleGenerateSlipQR} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md flex items-center justify-center transition">
                                                        <Smartphone className="w-4 h-4 mr-2" />
                                                        สร้าง QR Code รับสลิป
                                                    </button>
                                                </div>
                                            )}

                                            {/* ช่องทางอัปโหลดสลิปแบบปกติ */}
                                            <div className="border-t border-gray-200 pt-4 mt-2">
                                                <p className="text-sm font-bold text-gray-700 mb-2">
                                                    {userRole === 'donor' ? 'สแกน QR ด้านล่างแล้วแนบสลิปที่นี่' : 'หรือแนบหลักฐานการโอนด้วยตนเอง'}
                                                </p>
                                                
                                                {userRole === 'donor' && (
                                                    <div className="bg-white p-3 rounded-lg shadow-sm border inline-block mb-3 text-center">
                                                        <img src={settings.qrCodeUrl} alt="QR Code" className="w-32 h-32 object-contain mx-auto" />
                                                        <p className="text-xs text-gray-500 mt-1">{settings.bankInfo?.bankName}</p>
                                                        <p className={`text-lg font-mono font-bold text-${theme}-700 mt-1`}>{settings.bankInfo?.accountNumber}</p>
                                                    </div>
                                                )}

                                                <label className="cursor-pointer block border-2 border-dashed border-gray-300 rounded-lg p-4 hover:bg-gray-100 transition text-center">
                                                    <div className="flex flex-col items-center justify-center">
                                                        {isUploading ? <Loader className="w-6 h-6 animate-spin text-gray-400" /> : <UploadCloud className="w-6 h-6 text-gray-400 mb-1" />}
                                                        <span className="text-sm text-gray-600 font-medium">
                                                            {slipImage ? '✓ มีรูปสลิปแล้ว (คลิก)' : 'คลิกเพื่อเลือกไฟล์รูป'}
                                                        </span>
                                                    </div>
                                                    <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                                </label>
                                                
                                                {/* พรีวิวรูปสลิป */}
                                                {slipImage && (
                                                    <div className="mt-4 relative inline-block p-2 bg-white border rounded-xl shadow-sm w-full text-center">
                                                        <img src={slipImage} alt="Preview" className="h-32 object-contain rounded mx-auto" />
                                                        <button type="button" onClick={() => setSlipImage(null)} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1.5 shadow-lg hover:bg-red-600 transition"><X className="w-4 h-4" /></button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center text-gray-400 py-4">
                                            <ShoppingBag className="w-10 h-10 mb-2 opacity-50" />
                                            <p className="text-sm">
                                                {method === 'เงินสด' && (userRole === 'staff' || userRole === 'admin') ? 'สถานะ: อนุมัติทันทีและออกใบเสร็จ' : 'รับเงินผ่านช่องทางที่ระบุ'}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>
                        {/* ========================================================= */}

                        {/* ปุ่มยืนยัน (กว้างเต็มแถว ด้านล่างสุด) */}
                        <div className="mt-8 pt-6 border-t border-gray-200">
                            <button type="submit" disabled={isUploading || isGeneratingBlessing} className={`w-full text-white font-bold py-4 px-4 rounded-xl hover:bg-${theme}-700 transition shadow-lg flex justify-center items-center text-xl ${(isUploading || isGeneratingBlessing) ? 'bg-gray-400 cursor-not-allowed' : `bg-${theme}-600`}`}>
                                {(isUploading || isGeneratingBlessing) ? (
                                    <>กำลังประมวลผล...</>
                                ) : (
                                    <><CheckCircle className="w-7 h-7 mr-2 shrink-0" /> ยืนยันข้อมูล และออกใบเสร็จ</>
                                )}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }
        // ==========================================
        // DataTables-style Dashboard
        // ==========================================
        function Dashboard({ donations, userRole, onUpdateDonation, onDeleteDonation, showNotification, settings, loggedInUser }) {
            const [editingDonation, setEditingDonation] = useState(null);
            const [viewSlip, setViewSlip] = useState(null);
            const [itemToDelete, setItemToDelete] = useState(null); 
            const [viewReceipt, setViewReceipt] = useState(null); 
            
            // Export Modal States
            const [showExportModal, setShowExportModal] = useState(false);
            const [exportCols, setExportCols] = useState({
                id: false, date: true, time: true, name: true, purpose: true, amount: true, method: true, status: true, note: true, recordedBy: true
            });

            // Filtering & DataTables States
            const [filterDate, setFilterDate] = useState('');
            const [filterMethod, setFilterMethod] = useState('all');
            const [filterType, setFilterType] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10);

            // AI Summary States
            const [aiSummary, setAiSummary] = useState('');
            const [isGeneratingAi, setIsGeneratingAi] = useState(false);

            // Apply Filters and Search
            const filteredData = donations.filter(d => {
                let isValid = true;
                
                if (filterDate) {
                    const dDate = new Date(d.dateTime).toLocaleDateString('en-CA'); 
                    if (dDate !== filterDate) isValid = false;
                }
                if (filterMethod !== 'all') {
                    if (d.method !== filterMethod) isValid = false;
                }
                if (filterType !== 'all') {
                    if (filterType === 'roong_taan') {
                        if (!d.roongTaanDate && !d.purpose.includes('โรงทาน')) isValid = false;
                    } else if (filterType === 'thai_taan') {
                        if (!d.purpose.includes('ไทยทาน')) isValid = false;
                    } else if (filterType === 'hua_wat') {
                        if (!d.purpose.includes('หัววัด')) isValid = false;
                    } else if (filterType === 'general') {
                        if (d.roongTaanDate || d.purpose.includes('ไทยทาน') || d.purpose.includes('หัววัด')) isValid = false;
                    }
                }
                
                if (searchTerm && isValid) {
                    const term = searchTerm.toLowerCase();
                    const searchStr = `${d.name} ${d.purpose} ${d.generalNote} ${d.method} ${d.id}`.toLowerCase();
                    if (!searchStr.includes(term)) isValid = false;
                }
                
                return isValid;
            });

            const totalAmount = filteredData.reduce((sum, d) => d.status === 'approved' ? sum + (Number(d.amount) || 0) : sum, 0);

            // Pagination Logic
            const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const paginatedData = filteredData.slice(indexOfFirstItem, indexOfLastItem);

            useEffect(() => {
                setCurrentPage(1);
            }, [filterDate, filterMethod, filterType, searchTerm, itemsPerPage]);
            
            const handleExportCSV = () => {
                const headers = [];
                if(exportCols.id) headers.push("รหัสอ้างอิง");
                if(exportCols.date) headers.push("วันที่");
                if(exportCols.time) headers.push("เวลา");
                if(exportCols.name) headers.push("ชื่อ-สกุล");
                if(exportCols.purpose) headers.push("รายการบริจาค");
                if(exportCols.amount) headers.push("จำนวนเงิน");
                if(exportCols.method) headers.push("ช่องทาง");
                if(exportCols.status) headers.push("สถานะ");
                if(exportCols.note) headers.push("หมายเหตุ");
                if(exportCols.recordedBy) headers.push("ผู้บันทึก");

                const rows = filteredData.map(d => {
                    const row = [];
                    const dateObj = d.dateTime ? new Date(d.dateTime) : null;
                    if(exportCols.id) row.push(d.id || '-');
                    if(exportCols.date) row.push(dateObj ? dateObj.toLocaleDateString('th-TH') : '-');
                    if(exportCols.time) row.push(dateObj ? dateObj.toLocaleTimeString('th-TH') : '-');
                    if(exportCols.name) row.push(`"${(d.name || '').replace(/"/g, '""')}"`);
                    if(exportCols.purpose) row.push(`"${(d.purpose || '').replace(/"/g, '""')}"`);
                    if(exportCols.amount) row.push(d.amount || 0);
                    if(exportCols.method) row.push(d.method || '-');
                    if(exportCols.status) row.push(d.status === 'approved' ? 'อนุมัติ' : d.status === 'pending' ? 'รอตรวจ' : 'ปฏิเสธ');
                    if(exportCols.note) row.push(`"${(d.generalNote || '').replace(/"/g, '""')}"`);
                    if(exportCols.recordedBy) row.push(`"${(d.recordedBy || 'ออนไลน์').replace(/"/g, '""')}"`);
                    return row;
                });

                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `donation_report_${filterDate || 'all'}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setShowExportModal(false);
            };

            const resetFilters = () => {
                setFilterDate(''); setFilterMethod('all'); setFilterType('all'); setSearchTerm('');
            };

            const handlePrintReport = () => {
                const style = document.createElement('style');
                style.id = 'report-print-page-style';
                style.innerHTML = `@page { size: A4 portrait; margin: 15mm; }`;
                document.head.appendChild(style);

                const cleanup = () => {
                    const st = document.getElementById('report-print-page-style');
                    if (st) st.remove();
                    window.removeEventListener('afterprint', cleanup);
                };
                window.addEventListener('afterprint', cleanup);
                window.print();
            };

            const printDateDisplay = filterDate 
                ? new Date(filterDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })
                : "ข้อมูลทั้งหมด";

            const handleGenerateAiSummary = async () => {
                if (filteredData.length === 0) return showNotification("ไม่มีข้อมูลให้สรุป", "error");
                setIsGeneratingAi(true);
                try {
                    const methodCounts = filteredData.reduce((acc, d) => {
                        if (d.status === 'approved') acc[d.method] = (acc[d.method] || 0) + 1;
                        return acc;
                    }, {});
                    const topMethod = Object.keys(methodCounts).sort((a,b) => methodCounts[b] - methodCounts[a])[0];
                    
                    const prompt = `ในฐานะผู้เชี่ยวชาญและผู้ช่วยของวัด ${settings.templeName} ช่วยสรุปรายงานยอดบริจาคต่อไปนี้ให้คณะกรรมการวัดอ่าน:\n- ช่วงเวลา: ${printDateDisplay}\n- ยอดรวมสุทธิ (อนุมัติแล้ว): ${totalAmount.toLocaleString()} บาท\n- จำนวนรายการทั้งหมด: ${filteredData.length} รายการ\n- รายการที่รอตรวจสอบ: ${filteredData.filter(d=>d.status==='pending').length} รายการ\n- ช่องทางที่คนนิยมบริจาคมากที่สุด: ${topMethod || 'ไม่ระบุ'}\n\nกรุณาเขียนสรุปเชิงวิเคราะห์สั้นๆ 1-2 ย่อหน้า ภาษาเป็นทางการ สุภาพ และให้กำลังใจทีมงาน`;
                    const result = await callGemini(prompt);
                    setAiSummary(result.replace(/^["']|["']$/g, ''));
                    showNotification("สร้างสรุปรายงานด้วย AI สำเร็จ ✨");
                } catch(e) {
                    showNotification("สร้างสรุปรายงานไม่สำเร็จ กรุณาลองใหม่", "error");
                } finally {
                    setIsGeneratingAi(false);
                }
            };

            return (
                <div className="space-y-6 relative">
                    {/* Modal ชั้นต่างๆ */}
                    {editingDonation && (<EditModal donation={editingDonation} userRole={userRole} onClose={() => setEditingDonation(null)} onSave={onUpdateDonation} showNotification={showNotification} settings={settings} />)}
                    {viewSlip && (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setViewSlip(null)}><div className="relative max-w-3xl max-h-full"><img src={viewSlip} alt="Full Slip" className="max-w-full max-h-[90vh] rounded shadow-lg" /><button className="absolute -top-4 -right-4 bg-white rounded-full p-2 shadow" onClick={() => setViewSlip(null)}><X className="w-6 h-6" /></button></div></div>)}
                    {viewReceipt && (<ReceiptModal donation={viewReceipt} settings={settings} onClose={() => setViewReceipt(null)} />)}
                    
                    {/* ป๊อปอัปยืนยันลบข้อมูลรายบุคคล */}
                    {itemToDelete && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 text-center animate-scale-up">
                                <AlertTriangle className="w-12 h-12 text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-red-600 mb-2">ยืนยันการลบข้อมูล?</h3>
                                <p className="text-gray-600 mb-4 text-sm">คุณกำลังจะลบข้อมูลของ <strong>{itemToDelete.name}</strong><br/>* การกระทำนี้ลบออกจากระบบถาวร ไม่สามารถย้อนกลับได้</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setItemToDelete(null)} className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300 transition">ยกเลิก</button>
                                    <button onClick={() => { onDeleteDonation(itemToDelete.id); setItemToDelete(null); }} className="flex-1 bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700 transition">ยืนยันลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ป๊อปอัปเลือกคอลัมน์ Export CSV */}
                    {showExportModal && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6 animate-scale-up">
                                <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800"><Download className="w-5 h-5 mr-2 text-green-600" /> เลือกข้อมูลที่ต้องการรายงาน (CSV)</h3>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {Object.entries({
                                        id: 'รหัสอ้างอิง', date: 'วันที่', time: 'เวลา', name: 'ชื่อ-สกุล', purpose: 'รายการบริจาค', amount: 'จำนวนเงิน', method: 'ช่องทาง', status: 'สถานะ', note: 'หมายเหตุ', recordedBy: 'ผู้บันทึก'
                                    }).map(([key, label]) => (
                                        <label key={key} className="flex items-center space-x-2 text-sm bg-gray-50 p-2 rounded border cursor-pointer hover:bg-gray-100">
                                            <input type="checkbox" className="rounded text-green-600 focus:ring-green-500" checked={exportCols[key]} onChange={(e) => setExportCols({...exportCols, [key]: e.target.checked})} />
                                            <span>{label}</span>
                                        </label>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowExportModal(false)} className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300 font-medium">ยกเลิก</button>
                                    <button onClick={handleExportCSV} className="flex-1 bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700 flex items-center justify-center"><FileText className="w-4 h-4 mr-2" /> โหลดไฟล์</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Header & Tools (Screen Only) */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 no-print">
                        <h2 className="text-xl sm:text-2xl font-bold text-gray-800 flex items-center"><ClipboardList className="w-6 h-6 mr-2 text-orange-600" /> สรุปยอดและรายงาน</h2>
                        <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={handlePrintReport} className="flex-1 sm:flex-none flex items-center justify-center bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded text-sm transition-colors shadow"><Printer className="w-4 h-4 mr-2" /> พิมพ์รายงานทางการ (PDF)</button>
                            <button onClick={() => setShowExportModal(true)} className="flex-1 sm:flex-none flex items-center justify-center bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded text-sm transition-colors"><FileText className="w-4 h-4 mr-2" /> โหลด CSV</button>
                        </div>
                    </div>

                    {/* Filter Bar (Screen Only) */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 no-print">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                            <div className="flex items-center gap-2 text-sm font-medium text-gray-700"><SlidersHorizontal className="w-4 h-4" /> ตัวกรองข้อมูลและค้นหา</div>
                            
                            {/* ช่องค้นหา DataTables */}
                            <div className="relative w-full md:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Search className="h-4 w-4 text-gray-400" />
                                </div>
                                <input type="text" className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-500" placeholder="ค้นหา ชื่อ, รายการ, หมายเหตุ..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">วันที่</label>
                                <input type="date" className="w-full p-2 border rounded text-sm" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ช่องทางการเงิน</label>
                                <select className="w-full p-2 border rounded text-sm" value={filterMethod} onChange={(e) => setFilterMethod(e.target.value)}>
                                    <option value="all">ทั้งหมด</option>
                                    <option value="เงินสด">เฉพาะเงินสด</option>
                                    <option value="เงินโอน">เฉพาะเงินโอน</option>
                                    <option value="ทำรายการผ่าน LINE">ทำรายการผ่าน LINE</option>
                                    <option value="อื่นๆ">อื่นๆ</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ประเภทรายการ</label>
                                <select className="w-full p-2 border rounded text-sm" value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                    <option value="all">ทั้งหมด</option>
                                    <option value="general">บริจาคทั่วไป / ค่าน้ำไฟ</option>
                                    <option value="thai_taan">ไทยทาน</option>
                                    <option value="hua_wat">หัววัด</option>
                                    <option value="roong_taan">โรงทาน</option>
                                </select>
                            </div>
                            <div className="flex items-end">
                                <button onClick={resetFilters} className="w-full p-2 bg-gray-100 text-gray-600 rounded text-sm hover:bg-gray-200 transition">ล้างตัวกรอง</button>
                            </div>
                        </div>
                    </div>

                    {/* Summary Cards (Screen Only) */}
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6 no-print">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center col-span-2 md:col-span-1"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">ยอดรวม (ตามตัวกรอง)</span><span className="text-2xl sm:text-3xl font-bold text-green-600">{totalAmount.toLocaleString()} ฿</span></div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">จำนวนรายการ</span><span className="text-2xl sm:text-3xl font-bold text-blue-600">{filteredData.length}</span></div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 text-center"><span className="text-xs sm:text-sm font-medium text-gray-500 block mb-1">รอตรวจ</span><span className="text-2xl sm:text-3xl font-bold text-orange-500">{filteredData.filter(d=>d.status==='pending').length}</span></div>
                    </div>

                    {/* AI Summary Section (Screen Only) */}
                    <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 rounded-xl shadow-sm border border-indigo-100 mb-6 no-print">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold flex items-center text-indigo-800"><Sparkles className="w-5 h-5 mr-2" /> วิเคราะห์และสรุปยอดด้วย AI</h3>
                            <button onClick={handleGenerateAiSummary} disabled={isGeneratingAi || filteredData.length === 0} className="text-sm bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white px-4 py-2 rounded-lg font-medium flex items-center transition shadow-sm">
                                {isGeneratingAi ? <Loader className="w-4 h-4 mr-2 animate-spin"/> : <Sparkles className="w-4 h-4 mr-2"/>}
                                {isGeneratingAi ? 'กำลังวิเคราะห์...' : 'สร้างบทสรุป ✨'}
                            </button>
                        </div>
                        {aiSummary ? (
                            <div className="bg-white p-5 rounded-lg border border-indigo-100 text-gray-700 leading-relaxed whitespace-pre-wrap text-sm sm:text-base shadow-inner">
                                {aiSummary}
                            </div>
                        ) : (
                            <div className="text-center py-6 text-indigo-300 bg-white/50 rounded-lg border border-dashed border-indigo-200">
                                <p className="text-sm">คลิกปุ่ม "สร้างบทสรุป" เพื่อให้ AI ช่วยสรุปรายงานภาพรวมให้คุณแบบอัตโนมัติ</p>
                            </div>
                        )}
                    </div>

                    {/* DataTables Display (Screen Only) */}
                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden no-print">
                        {/* DataTables Top Control */}
                        <div className="p-4 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50">
                            <div className="text-sm text-gray-600 flex items-center">
                                แสดง
                                <select className="mx-2 border border-gray-300 rounded p-1 outline-none bg-white" value={itemsPerPage} onChange={(e) => setItemsPerPage(Number(e.target.value))}>
                                    <option value={10}>10</option>
                                    <option value={20}>20</option>
                                    <option value={50}>50</option>
                                    <option value={100}>100</option>
                                </select>
                                รายการ
                            </div>
                            <div className="text-sm text-gray-600">
                                พบข้อมูลทั้งหมด <span className="font-bold text-orange-600">{filteredData.length}</span> รายการ
                            </div>
                        </div>

                        {/* Screen Table */}
                        <div className="overflow-x-auto min-h-[300px]">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase w-16">ลำดับ</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-32">วัน-เวลา</th>

                                            <textarea readOnly className="w-full mt-1 p-2 bg-white border rounded h-48 font-mono text-[11px] sm:text-xs text-gray-700 outline-none" value={`function doPost(e) {\n  var CHANNEL_ACCESS_TOKEN = "ใส่_TOKEN_ที่นี่";\n  var targetIdsStr = e.parameter.targetIds || "";\n  var targets = targetIdsStr.split(",").map(function(id) { return id.trim(); }).filter(function(id) { return id !== ""; });\n  \n  if (targets.length === 0) return ContentService.createTextOutput("No targets");\n\n  var message = e.parameter.message;\n  var url = "https://api.line.me/v2/bot/message/multicast";\n  var options = {\n    "method": "post",\n    "headers": {\n      "Content-Type": "application/json",\n      "Authorization": "Bearer " + CHANNEL_ACCESS_TOKEN\n    },\n    "payload": JSON.stringify({\n      "to": targets,\n      "messages": [{ "type": "text", "text": message }]\n    })\n  };\n  UrlFetchApp.fetch(url, options);\n  return ContentService.createTextOutput("OK");\n}`}></textarea>

                if (userRole === 'staff') return perms.includes(tab);

            useEffect(() => {
                if (isAuthenticated && userRole === 'staff') {
                    if (perms.includes('donate')) setActiveTab('donate');

                    else if (perms.includes('announcer')) setActiveTab('announcer');
                    else if (perms.includes('news')) setActiveTab('news');
                    else if (perms.includes('approval')) setActiveTab('approval');

            const handleLogout = () => { 
                window.location.reload(); 
            };

        // ==========================================
